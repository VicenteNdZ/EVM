<!DOCTYPE html>
<html style="background:#120407">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body style="background:#120407; margin:0">
<x-dc>
<helmet>
<script src="evm-ns.js"></script>
<script src="sfx.js"></script>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=Marcellus&display=swap" rel="stylesheet" />
<style>
  /* __tungsten_all */ body, button, input, select, textarea, span, div, h1, h2, h3, p { font-family: 'Tungsten','Oswald',ui-sans-serif,system-ui,sans-serif; }
  html, body { margin: 0; height: 100%; background: #1a0f24; }
  * { box-sizing: border-box; }
</style>
</helmet>
<div style="position:fixed; inset:0; display:flex; flex-direction:column; background:radial-gradient(circle at 60% 25%, #45101a 0%, #2a0a10 55%, #160508 100%); color:#e8e8e8; font-family:'Tungsten','Oswald',ui-sans-serif,system-ui,sans-serif;">

  <div style="flex:none; height:54px; box-sizing:border-box; display:flex; align-items:center; gap:12px; padding:0 28px; border-bottom:2px solid #16c8d0; box-shadow:0 2px 18px rgba(22,200,208,.4); background:linear-gradient(100deg, #1a0608 0%, #3a0c12 45%, #5e1018 75%, #7a141c 100%); #e8602b 74%, #f4922e 90%, #ffb347 100%); box-shadow:0 2px 16px rgba(192,48,106,.4); white-space:nowrap;">
    <button onClick="{{ toggleSound }}" ref="{{ soundBtnRef }}" title="Sonido" style="flex:none; width:34px; height:34px; display:flex; align-items:center; justify-content:center; border:none; background:transparent; color:#f0d27a; cursor:pointer; padding:0;" style-hover="color:#ffe49a;"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5L6 9H2v6h4l5 4z"></path><path data-on="1" d="M15.5 8.5a5 5 0 0 1 0 7"></path><path data-on="1" d="M18.5 6a8 8 0 0 1 0 12"></path><path data-off="1" style="display:none" d="M22 9l-5 6M17 9l5 6"></path></svg></button>
    <button onClick="{{ toggleFullscreen }}" title="Pantalla completa" style="flex:none; width:34px; height:34px; display:flex; align-items:center; justify-content:center; border:none; background:transparent; color:#f0d27a; cursor:pointer; padding:0;" style-hover="color:#ffe49a;"><svg width="20" height="20" viewBox="0 0 16 16" fill="none"><path d="M2 6V2.5h3.5M14 6V2.5h-3.5M2 10v3.5h3.5M14 10v3.5h-3.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
    <button onClick="{{ logout }}" title="Cerrar sesión" style="flex:none; width:34px; height:34px; display:flex; align-items:center; justify-content:center; border:none; background:transparent; color:#f0d27a; cursor:pointer; padding:0;" style-hover="color:#ff9aa2;"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><path d="M16 17l5-5-5-5"></path><path d="M21 12H9"></path></svg></button>
    <div style="position:relative;">
      <button onClick="{{ toggleWsMenu }}" title="Cambiar espacio de trabajo" style="flex:none; display:flex; align-items:center; gap:8px; height:32px; padding:0 6px; border-radius:8px; cursor:pointer; font-family:inherit; border:none; background:transparent; color:#fff;" style-hover="color:#f0d27a;">
        <span ref="{{ wsIconRef }}" style="display:flex; align-items:center; color:#f0d27a;"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round" stroke-linecap="round"><circle cx="12" cy="8" r="3.2"></circle><path d="M6.5 20v-1.5a5.5 5.5 0 0 1 11 0V20"></path><circle cx="4.5" cy="9.5" r="2.2"></circle><path d="M1.5 19v-1a4 4 0 0 1 3.4-3.95"></path><circle cx="19.5" cy="9.5" r="2.2"></circle><path d="M22.5 19v-1a4 4 0 0 0-3.4-3.95"></path></svg></span>
      </button>
      <div ref="{{ wsMenuRef }}" style="display:none; position:absolute; top:38px; left:0; min-width:190px; background:#1c0a0e; border:1px solid rgba(22,200,208,.35); border-radius:10px; box-shadow:0 14px 40px rgba(0,0,0,.55); padding:6px; z-index:60;"></div>
    </div>
    <button onClick="{{ goProjects }}" title="Projects" style="flex:none; width:34px; height:34px; display:flex; align-items:center; justify-content:center; border:none; background:transparent; color:#f0d27a; cursor:pointer; padding:0;" style-hover="color:#ffffff; filter:drop-shadow(0 0 6px rgba(255,255,255,.8));"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"><path d="M3 11l9-7 9 7"></path><path d="M5 9.5V20h14V9.5"></path><path d="M10 20v-5h4v5"></path></svg></button>
    <div style="flex:1;"></div>
    <span ref="{{ projRightRef }}" style="flex:none; max-width:240px; font-family:Arial,sans-serif; font-weight:700; font-size:18px; letter-spacing:.01em; color:#ffffff; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; text-align:right;"></span>
    <div style="width:1px; height:22px; background:rgba(240,210,122,.3); margin:0 2px;"></div>
    <button onClick="{{ goBuilds }}" title="Build" style="flex:none; width:34px; height:34px; display:flex; align-items:center; justify-content:center; border:none; background:transparent; color:#f0d27a; cursor:pointer; padding:0;" style-hover="color:#ffffff; filter:drop-shadow(0 0 6px rgba(255,255,255,.8));"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round"><rect x="3" y="3" width="7" height="7" rx="1"></rect><rect x="14" y="3" width="7" height="7" rx="1"></rect><rect x="3" y="14" width="7" height="7" rx="1"></rect><rect x="14" y="14" width="7" height="7" rx="1"></rect></svg></button>
    <button onClick="{{ goPrecios }}" title="Precios" style="flex:none; width:34px; height:34px; display:flex; align-items:center; justify-content:center; border:none; background:transparent; color:#f0d27a; cursor:pointer; padding:0;" style-hover="color:#ffffff; filter:drop-shadow(0 0 6px rgba(255,255,255,.8));"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round" stroke-linecap="round"><path d="M12 1v22"></path><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg></button>
    <button onClick="{{ goReporte }}" title="Reporte" style="flex:none; width:34px; height:34px; display:flex; align-items:center; justify-content:center; border:none; background:transparent; color:#f0d27a; cursor:pointer; padding:0;" style-hover="color:#ffffff; filter:drop-shadow(0 0 6px rgba(255,255,255,.8));"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round" stroke-linecap="round"><path d="M9 2h6l4 4v14a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1V3a1 1 0 0 1 1-1z"></path><path d="M14 2v5h5"></path><path d="M8 13h8"></path><path d="M8 17h8"></path><path d="M8 9h3"></path></svg></button>
  </div>


  <div style="flex:1; overflow:auto; padding:40px 48px 64px;">
    <div style="max-width:1180px; margin:0 auto;">

      <input ref="{{ fileRef }}" onChange="{{ onFiles }}" type="file" accept="application/pdf" multiple style="display:none;" />

      <div style="display:flex; align-items:stretch; gap:16px; margin-bottom:32px;">
        <div ref="{{ dropRef }}" onClick="{{ pick }}" onDragOver="{{ onDragOver }}" onDragLeave="{{ onDragLeave }}" onDrop="{{ onDrop }}"
          title="Upload plans" style="flex:1; min-width:0; display:flex; align-items:center; justify-content:center; height:56px; border-radius:12px; cursor:pointer; background:transparent; border:1.5px dashed rgba(255,255,255,.28); transition:border-color .15s;" style-hover="border-color:#16c8d0;">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.7"><path d="M12 16V4"></path><path d="M7 9l5-5 5 5"></path><path d="M5 20h14"></path></svg>
        </div>
        <div onClick="{{ goLastPlan }}" title="{{ openPlanName }}" style="{{ planoBoxStyle }}" style-hover="border-color:#16c8d0;">
          <span style="display:flex; align-items:center; gap:9px; max-width:92%; color:#fff; font-size:14px; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.7" stroke-linejoin="round" stroke-linecap="round" style="flex:none;"><path d="M9 4L3 6.5v13.5l6-2.5 6 2.5 6-2.5V3l-6 2.5z"></path><path d="M9 4v13.5"></path><path d="M15 6.5V20"></path></svg>
            <span style="overflow:hidden; text-overflow:ellipsis;">{{ openPlanName }}</span>
          </span>
        </div>
        <div onClick="{{ goLast3d }}" title="Abrir en 3D" style="{{ plano3dBoxStyle }}" style-hover="border-color:#16c8d0;">
          <span style="display:flex; align-items:center; gap:9px; max-width:92%; color:#bdf3f6; font-size:14px; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">
            <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="#16c8d0" stroke-width="1.7" stroke-linejoin="round" stroke-linecap="round" style="flex:none;"><path d="M12 2l9 5v10l-9 5-9-5V7z"></path><path d="M12 12l9-5"></path><path d="M12 12v10"></path><path d="M12 12L3 7"></path></svg>
            <span style="overflow:hidden; text-overflow:ellipsis;">3D</span>
          </span>
        </div>
      </div>

      <sc-if value="{{ hasCuts }}" hint-placeholder-val="{{ false }}">
        <div style="margin-bottom:30px;">
          <div style="display:flex; align-items:center; gap:8px; margin-bottom:14px;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#16c8d0" stroke-width="1.7" stroke-linejoin="round" stroke-linecap="round"><path d="M12 2l9 5v10l-9 5-9-5V7z"></path><path d="M12 12l9-5"></path><path d="M12 12v10"></path><path d="M12 12L3 7"></path></svg>
            <h2 style="margin:0; font-size:16px; font-weight:600; color:#fff;">Vistas 3D <span style="color:rgba(255,255,255,.55); font-weight:400;">({{ cutCount }})</span></h2>
          </div>
          <div style="display:grid; grid-template-columns:repeat(auto-fill, minmax(220px, 1fr)); gap:14px;">
            <sc-for list="{{ cuts }}" as="cut" hint-placeholder-count="0">
              <div onClick="{{ cut.toggleMark }}" style="{{ cut.cardStyle }}" style-hover="border-color:#16c8d0;">
                <button onClick="{{ cut.toggleMark }}" title="{{ cut.shownTitle }}" style="{{ cut.toggleStyle }}">
                  <sc-if value="{{ cut.marked }}" hint-placeholder-val="{{ false }}">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#06210f" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"></path></svg>
                  </sc-if>
                </button>
                <div style="height:120px; background:#0c1518; display:flex; align-items:center; justify-content:center; border-bottom:1px solid rgba(22,200,208,.2); overflow:hidden; perspective:520px;">
                  {{ cut.thumbNode }}
                  <sc-if value="{{ cut.noThumb }}" hint-placeholder-val="{{ true }}">
                    <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="#2e6b70" stroke-width="1.3"><path d="M12 2l9 5v10l-9 5-9-5V7z"></path><path d="M12 12l9-5"></path><path d="M12 12v10"></path><path d="M12 12L3 7"></path></svg>
                  </sc-if>
                </div>
                <div style="padding:12px;">
                  <h3 style="margin:0 0 4px; font-size:13.5px; font-weight:600; color:#bdf3f6; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">{{ cut.name }}</h3>
                  <div style="font-size:11.5px; color:rgba(255,255,255,.5); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">{{ cut.planLabel }}</div>
                </div>
                <button onClick="{{ cut.remove }}" title="Eliminar vista 3D" style="position:absolute; top:8px; right:8px; width:26px; height:26px; border:none; background:rgba(20,20,20,.85); color:#cfcfcf; border-radius:6px; cursor:pointer; font-size:13px;" style-hover="color:#ff8a8a;">✕</button>
              </div>
            </sc-for>
          </div>
        </div>
      </sc-if>

      <div style="position:relative; display:flex; align-items:center; min-height:38px; margin-bottom:16px;">
        <h2 style="margin:0; font-size:16px; font-weight:600; color:#fff;">Planos <span ref="{{ countRef }}" style="color:rgba(255,255,255,.55); font-weight:400;">(0)</span></h2>
        <sc-if value="{{ selectMode }}" hint-placeholder-val="{{ false }}">
          <div style="position:absolute; right:0; top:50%; transform:translateY(-50%); display:flex; align-items:center; gap:10px;">
            <button onClick="{{ toggleAll }}" title="{{ allTitle }}" style="{{ allBtnStyle }}">{{ allLabel }}</button>
            <button onClick="{{ exitSelect }}" title="Confirmar selección" style="{{ confirmStyle }}">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"></path></svg>
            </button>
          </div>
        </sc-if>
      </div>

      <sc-if value="{{ isEmpty }}" hint-placeholder-val="{{ true }}">
        <p style="margin:0; font-size:14px; color:#7a7a7a;">Todavía no hay planos en este proyecto.</p>
      </sc-if>

      <div style="display:grid; grid-template-columns:repeat(auto-fill, minmax(260px, 1fr)); gap:16px;">
        <sc-for list="{{ plans }}" as="plan" hint-placeholder-count="0">
          <div onClick="{{ plan.onCardClick }}" onMouseDown="{{ plan.onPressStart }}" onMouseUp="{{ plan.onPressEnd }}" onMouseLeave="{{ plan.onPressEnd }}" onTouchStart="{{ plan.onPressStart }}" onTouchEnd="{{ plan.onPressEnd }}" style="{{ plan.cardStyle }}" style-hover="border-color:#f4922e;">
            <button onClick="{{ plan.toggleShown }}" title="{{ plan.shownTitle }}" style="{{ plan.toggleStyle }}">
              <sc-if value="{{ plan.shown }}" hint-placeholder-val="{{ false }}">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#06210f" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"></path></svg>
              </sc-if>
            </button>
            <div style="height:148px; background:#efefef; display:flex; align-items:center; justify-content:center; border-bottom:1px solid rgba(255,255,255,.14); overflow:hidden;">
              {{ plan.thumbNode }}
              <sc-if value="{{ plan.noThumb }}" hint-placeholder-val="{{ true }}">
                <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="#b5b5b5" stroke-width="1.4"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><path d="M14 2v6h6"></path></svg>
              </sc-if>
            </div>
            <div style="padding:14px;">
              <h3 style="margin:0 0 4px; font-size:14px; font-weight:600; color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">{{ plan.name }}</h3>
              <div style="display:flex; align-items:center; justify-content:flex-end; font-size:12px; color:rgba(255,255,255,.6);">
                <span>{{ plan.dateLabel }}</span>
              </div>
            </div>
            <button onClick="{{ plan.remove }}" title="Eliminar" style="position:absolute; top:8px; right:8px; width:26px; height:26px; border:none; background:rgba(20,20,20,.85); color:#cfcfcf; border-radius:6px; cursor:pointer; font-size:13px;" style-hover="color:#7fcf94;">✕</button>
          </div>
        </sc-for>
      </div>

    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  PKEY = 'agd_projects_v1';
  state = { plans: [], notFound: false, selectMode: false };
  project = null;
  thumbs = {};      // planId -> dataURL
  docCache = {};    // source key -> pdfjs document
  _lib = null;

  crumbRef = React.createRef();
  soundBtnRef = React.createRef();
  projRightRef = React.createRef();
  wsIconRef = React.createRef();
  wsNameRef = React.createRef();
  wsMenuRef = React.createRef();
  planoBtnRef = React.createRef();
  planoBackRef = React.createRef();
  objBtnRef = React.createRef();
  fileRef = React.createRef();
  dropRef = React.createRef();
  countRef = React.createRef();

  // ---- workspace selector (Personal / Organización) ----
  wsLabel(ws) {
    if (!ws || ws === 'personal') return 'Personal';
    if (ws.indexOf('org::') === 0) { const id = ws.slice(5); const o = (window.__evmOrgs || []).find((x) => x.id === id); return o ? o.name : 'Organización'; }
    return 'Personal';
  }
  closeWsMenu() { const m = this.wsMenuRef.current; if (m) m.style.display = 'none'; if (this._wsDoc) { document.removeEventListener('mousedown', this._wsDoc); this._wsDoc = null; } }
  switchWs(ws) {
    if (ws === window.__evmWs) { this.closeWsMenu(); return; }
    try { window.localStorage.setItem('evm_ws::' + window.__evmUser, ws); } catch (e) {}
    const u = new URL(location.href); u.pathname = u.pathname.replace(/[^/]+$/, 'HOME.dc.html'); u.search = ''; location.href = u.toString();
  }
  buildWsUI() {
    const cur = window.__evmWs || 'personal';
    if (this.wsNameRef.current) this.wsNameRef.current.textContent = this.wsLabel(cur);
    if (this.wsIconRef.current) { const isOrg = cur && cur.indexOf('org::') === 0; this.wsIconRef.current.innerHTML = isOrg ? '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round" stroke-linecap="round"><circle cx="12" cy="8" r="3.2"></circle><path d="M6.5 20v-1.5a5.5 5.5 0 0 1 11 0V20"></path><circle cx="4.5" cy="9.5" r="2.2"></circle><path d="M1.5 19v-1a4 4 0 0 1 3.4-3.95"></path><circle cx="19.5" cy="9.5" r="2.2"></circle><path d="M22.5 19v-1a4 4 0 0 0-3.4-3.95"></path></svg>' : '<svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"><circle cx="12" cy="8" r="4"></circle><path d="M4 21c0-4 4-6 8-6s8 2 8 6"></path></svg>'; }
    const m = this.wsMenuRef.current; if (!m) return;
    m.innerHTML = '';
    const opts = [{ ws: 'personal', label: (window.__evmUser || 'Personal'), org: false }];
    (window.__evmMyOrgs || []).forEach((o) => { opts.push({ ws: 'org::' + o.id, label: o.name, org: true }); });
    opts.forEach((opt) => {
      const active = opt.ws === cur;
      const b = document.createElement('button');
      b.style.cssText = 'width:100%; display:flex; align-items:center; gap:10px; padding:9px 10px; border:none; border-radius:7px; cursor:pointer; text-align:left; font-family:inherit; background:' + (active ? 'rgba(22,200,208,.16)' : 'transparent') + '; color:#fff;';
      b.onmouseenter = () => { if (!active) b.style.background = 'rgba(255,255,255,.07)'; };
      b.onmouseleave = () => { if (!active) b.style.background = 'transparent'; };
      const icon = opt.org
        ? '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round" stroke-linecap="round"><circle cx="12" cy="8" r="3.2"></circle><path d="M6.5 20v-1.5a5.5 5.5 0 0 1 11 0V20"></path><circle cx="4.5" cy="9.5" r="2.2"></circle><path d="M1.5 19v-1a4 4 0 0 1 3.4-3.95"></path><circle cx="19.5" cy="9.5" r="2.2"></circle><path d="M22.5 19v-1a4 4 0 0 0-3.4-3.95"></path></svg>'
        : '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"><circle cx="12" cy="8" r="4"></circle><path d="M4 21c0-4 4-6 8-6s8 2 8 6"></path></svg>';
      b.innerHTML = '<span style="display:flex; color:' + (active ? '#16c8d0' : 'rgba(255,255,255,.55)') + ';">' + icon + '</span>'
        + '<span style="flex:1; min-width:0; font-size:13.5px; letter-spacing:.04em; text-transform:capitalize;">' + opt.label + '</span>'
        + (active ? '<span style="color:#16c8d0;"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M20 6L9 17l-5-5"></path></svg></span>' : '');
      b.onclick = () => this.switchWs(opt.ws);
      m.appendChild(b);
    });
  }
  // ---- token-preserving navigation ----
  navTo(file, params) {
    const u = new URL(location.href);
    u.pathname = u.pathname.replace(/[^/]+$/, file);
    if (params) Object.keys(params).forEach((k) => u.searchParams.set(k, params[k]));
    location.href = u.toString();
  }

  // ---- IndexedDB for PDF blobs ----
  idb() {
    return new Promise((res, rej) => {
      const r = indexedDB.open('agd_plan_blobs', 1);
      r.onupgradeneeded = () => r.result.createObjectStore('blobs');
      r.onsuccess = () => res(r.result);
      r.onerror = () => rej(r.error);
    });
  }
  async putBlob(key, blob) {
    const db = await this.idb();
    return new Promise((res, rej) => {
      const tx = db.transaction('blobs', 'readwrite');
      tx.objectStore('blobs').put(blob, key);
      tx.oncomplete = () => res();
      tx.onerror = () => rej(tx.error);
    });
  }
  async getBlob(key) {
    const db = await this.idb();
    return new Promise((res) => {
      const tx = db.transaction('blobs', 'readonly');
      const rq = tx.objectStore('blobs').get(key);
      rq.onsuccess = () => res(rq.result || null);
      rq.onerror = () => res(null);
    });
  }
  async delBlob(key) {
    const db = await this.idb();
    return new Promise((res) => {
      const tx = db.transaction('blobs', 'readwrite');
      tx.objectStore('blobs').delete(key);
      tx.oncomplete = () => res();
      tx.onerror = () => res();
    });
  }

  async lib() {
    if (this._lib) return this._lib;
    const lib = await import('https://cdn.jsdelivr.net/npm/pdfjs-dist@4.0.379/build/pdf.min.mjs');
    lib.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.0.379/build/pdf.worker.min.mjs';
    this._lib = lib;
    return lib;
  }
  async getDoc(pl) {
    const key = pl.blobKey || pl.src || pl.id;
    if (this.docCache[key]) return this.docCache[key];
    let data;
    if (pl.src) data = await (await fetch(encodeURI(pl.src))).arrayBuffer();
    else { const blob = await this.getBlob(pl.blobKey || pl.id); if (!blob) return null; data = await blob.arrayBuffer(); }
    const lib = await this.lib();
    const doc = await lib.getDocument({ data: new Uint8Array(data) }).promise;
    this.docCache[key] = doc;
    return doc;
  }
  async buildThumbs() {
    for (const pl of this.state.plans) {
      if (this.thumbs[pl.id]) continue;
      try {
        const doc = await this.getDoc(pl);
        if (!doc) continue;
        const page = await doc.getPage(pl.page || 1);
        const vp0 = page.getViewport({ scale: 1 });
        const scale = Math.min(2.4, 560 / vp0.width);
        const vp = page.getViewport({ scale });
        const c = document.createElement('canvas');
        c.width = Math.ceil(vp.width); c.height = Math.ceil(vp.height);
        const ctx = c.getContext('2d');
        ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, c.width, c.height);
        await page.render({ canvasContext: ctx, viewport: vp }).promise;
        this.thumbs[pl.id] = c.toDataURL('image/jpeg', 0.82);
        this.forceUpdate();
      } catch (e) {}
    }
  }

  get pid() {
    const m = location.search.match(/[?&]id=([^&]+)/);
    return m ? decodeURIComponent(m[1]) : null;
  }
  plansKey() { return 'agd_plans_' + this.pid; }
  tabsKey() { return 'agd_tabs_' + this.pid; }
  toggleCutMark(id) {
    let m = []; try { m = JSON.parse(localStorage.getItem('agd_cutmarks_' + this.pid) || '[]') || []; } catch (e) {}
    if (m.includes(id)) m = m.filter((x) => x !== id); else m.push(id);
    try { localStorage.setItem('agd_cutmarks_' + this.pid, JSON.stringify(m)); } catch (e) {}
    this.forceUpdate();
  }
  readTabs() { try { return JSON.parse(localStorage.getItem(this.tabsKey()) || '[]') || []; } catch (e) { return []; } }
  shownTabIds() { return new Set(this.readTabs().map((t) => t.id)); }
  toggleShown(pl) {
    let tabs = this.readTabs();
    if (tabs.some((t) => t.id === pl.id)) tabs = tabs.filter((t) => t.id !== pl.id);
    else tabs.push({ id: pl.id, name: pl.name });
    try { localStorage.setItem(this.tabsKey(), JSON.stringify(tabs)); } catch (e) {}
    this.forceUpdate();
    this.refreshPlanoBtns();
  }
  setAllShown(on) {
    let tabs;
    if (on) tabs = this.state.plans.map((p) => ({ id: p.id, name: p.name }));
    else tabs = [];
    try { localStorage.setItem(this.tabsKey(), JSON.stringify(tabs)); } catch (e) {}
    this.forceUpdate();
    this.refreshPlanoBtns();
  }

  toggleSound() {
    this._muted = !this._muted;
    try { localStorage.setItem('agd_muted', this._muted ? '1' : '0'); } catch (e) {}
    this.applySoundBtn();
  }
  applySoundBtn() {
    const b = this.soundBtnRef && this.soundBtnRef.current; if (!b) return;
    b.querySelectorAll('[data-on]').forEach((el) => { el.style.display = this._muted ? 'none' : ''; });
    b.querySelectorAll('[data-off]').forEach((el) => { el.style.display = this._muted ? '' : 'none'; });
    b.title = this._muted ? 'Sonido apagado' : 'Sonido encendido';
  }
  componentDidMount() {
    try { this._muted = localStorage.getItem('agd_muted') === '1'; } catch (e) { this._muted = false; }
    setTimeout(() => { this.applySoundBtn(); }, 0);
    let all = [];
    try { all = JSON.parse(localStorage.getItem(this.PKEY) || '[]'); } catch (e) {}
    this.project = all.find((p) => p.id === this.pid) || null;
    if (!this.project) { this.setState({ notFound: true }); return; }
    if (this.crumbRef.current) this.crumbRef.current.textContent = this.project.name;
    if (this.projRightRef.current) this.projRightRef.current.textContent = this.project.name;
    try { this.buildWsUI(); } catch (e) {}
    let plans = [];
    try { plans = JSON.parse(localStorage.getItem(this.plansKey()) || '[]'); } catch (e) {}
    this.setState({ plans }, () => { this.buildThumbs(); this.renameBySheet(); this.refreshPlanoBtns(); });
    if (this.planoBtnRef.current) this.planoBtnRef.current.style.display = 'flex';
    if (this.objBtnRef.current) this.objBtnRef.current.style.display = 'flex';
    this.refreshPlanoBtns();
  }

  // resume-plan for THIS project, based on the GREEN-marked plans (tabs):
  //  - marked plans exist → resume the last-open marked one, else the first marked
  //  - no plans marked green → null (the "plano abierto" button stays LOCKED)
  activePlan() {
    const plans = this.state.plans || [];
    if (!plans.length) return null;
    const marked = this.readTabs().filter((t) => plans.some((p) => p.id === t.id)).map((t) => t.id);
    if (!marked.length) return null;
    let lp = null; try { lp = JSON.parse(localStorage.getItem('agd_last_plan') || 'null'); } catch (e) {}
    const planId = (lp && lp.project === this.pid && marked.includes(lp.plan)) ? lp.plan : marked[0];
    return { project: this.pid, plan: planId };
  }
  refreshPlanoBtns() {
    const ok = !!this.activePlan();
    [this.planoBtnRef, this.objBtnRef].forEach((r) => {
      const b = r && r.current; if (!b) return;
      b.style.opacity = ok ? '1' : '.32';
      b.style.pointerEvents = ok ? 'auto' : 'none';
      b.style.cursor = ok ? 'pointer' : 'not-allowed';
    });
    if (this.planoBtnRef.current) this.planoBtnRef.current.title = ok ? 'Plano abierto' : 'Este proyecto no tiene planos';
    const pb = this.planoBackRef.current;
    if (pb) pb.style.display = ok ? 'flex' : 'none';
  }

  // pull the sheet number (e.g. "A2.00") from a page's title block
  async extractSheet(pl) {
    const doc = await this.getDoc(pl);
    if (!doc) return undefined;                 // could not read → retry later
    try {
      const page = await doc.getPage(pl.page || 1);
      const tc = await page.getTextContent();
      const re = /^[A-Z]{1,3}-?\d{1,2}(\.\d{1,2})?[A-Z]?$/;
      let best = null;
      for (const it of tc.items) {
        const s = (it.str || '').trim().replace(/\s+/g, '');
        if (!re.test(s)) continue;
        const t = it.transform;
        const h = Math.hypot(t[2], t[3]);         // font height
        const score = h * 1e6 + t[4] - t[5];      // biggest, then right-most, then lowest
        if (!best || score > best.score) best = { s, score };
      }
      return best ? best.s : null;
    } catch (e) { return null; }
  }
  // rename every plan by its sheet number (one-time per plan)
  async renameBySheet() {
    let plans = this.state.plans.slice();
    for (let i = 0; i < plans.length; i++) {
      if (plans[i].sheetNamed) continue;
      const sheet = await this.extractSheet(plans[i]);
      if (sheet === undefined) continue;          // doc not ready, try next load
      const name = sheet || ('Página ' + (plans[i].page || 1));
      plans[i] = Object.assign({}, plans[i], { name, sheetNamed: true });
      this.savePlans(plans.slice());
    }
  }

  fmtDate(ts) {
    try { return new Date(ts).toLocaleDateString('es', { day: '2-digit', month: 'short', year: 'numeric' }); }
    catch (e) { return ''; }
  }
  fmtSize(b) {
    if (b > 1e6) return (b / 1e6).toFixed(1) + ' MB';
    if (b > 1e3) return Math.round(b / 1e3) + ' KB';
    return b + ' B';
  }
  savePlans(plans) {
    this.setState({ plans });
    try { localStorage.setItem(this.plansKey(), JSON.stringify(plans)); } catch (e) {}
    try {
      const all = JSON.parse(localStorage.getItem(this.PKEY) || '[]');
      const i = all.findIndex((p) => p.id === this.pid);
      if (i >= 0) { all[i].pages = plans.length; localStorage.setItem(this.PKEY, JSON.stringify(all)); }
    } catch (e) {}
  }

  async addFiles(fileList) {
    const files = [...fileList].filter((f) => f.type === 'application/pdf' || /\.pdf$/i.test(f.name));
    if (!files.length) return;
    const added = [];
    for (const f of files) {
      const base = f.name.replace(/\.pdf$/i, '');
      const blobKey = 'blob' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
      await this.putBlob(blobKey, f);
      let numPages = 1;
      try {
        const lib = await this.lib();
        const doc = await lib.getDocument({ data: new Uint8Array(await f.arrayBuffer()) }).promise;
        numPages = doc.numPages;
        this.docCache[blobKey] = doc;
      } catch (e) {}
      for (let n = 1; n <= numPages; n++) {
        const pl = { id: blobKey + '_p' + n, blobKey, page: n, name: 'Página ' + n, size: f.size, addedAt: Date.now() };
        const sheet = await this.extractSheet(pl);
        if (sheet) { pl.name = sheet; pl.sheetNamed = true; }
        added.push(pl);
      }
    }
    this.savePlans([...added, ...this.state.plans]);
    this.buildThumbs();
  }

  renderVals() {
    let _lp = null; try { _lp = JSON.parse(localStorage.getItem('agd_last_plan') || 'null'); } catch (e) {}
    const activePlanId = (_lp && _lp.project === this.pid) ? _lp.plan : null;
    const shownSet = this.shownTabIds();
    const selectMode = this.state.selectMode;
    const plans = this.state.plans.map((pl) => {
      const isShown = shownSet.has(pl.id);
      return ({
      name: pl.name,
      active: pl.id === activePlanId,
      shown: isShown,
      shownTitle: isShown ? 'Se muestra en la interfaz — clic para ocultar' : 'Marcar para mostrar en la interfaz',
      toggleShown: (e) => { e.stopPropagation(); this.toggleShown(pl); },
      onPressStart: (e) => {
        this._longFired = false;
        clearTimeout(this._pressTimer);
        this._pressTimer = setTimeout(() => {
          this._longFired = true;
          if (!this.state.selectMode) this.setState({ selectMode: true });
          this.toggleShown(pl);
        }, 420);
      },
      onPressEnd: () => { clearTimeout(this._pressTimer); },
      onCardClick: (e) => {
        clearTimeout(this._pressTimer);
        if (this._longFired) { this._longFired = false; return; }
        if (this.state.selectMode) { this.toggleShown(pl); }
      },
      cardStyle: 'position:relative; user-select:none; -webkit-user-select:none; -webkit-touch-callout:none; border:1px solid ' + (selectMode && isShown ? '#3ee07a' : 'rgba(22,200,208,.3)') + '; background:rgba(20,40,46,.5); border-radius:5px; overflow:hidden; cursor:pointer; transition:border-color .15s; backdrop-filter:blur(8px); box-shadow:' + (selectMode && isShown ? '0 0 0 1px #3ee07a, 0 6px 20px rgba(0,0,0,.3)' : '0 6px 20px rgba(0,0,0,.3)') + ';',
      toggleStyle: 'position:absolute; top:8px; left:8px; z-index:6; width:26px; height:20px; border-radius:5px; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:background .15s, border-color .15s; border:1px solid ' + (isShown ? '#3ee07a' : 'rgba(255,255,255,.45)') + '; background:' + (isShown ? '#3ee07a' : 'rgba(120,128,130,.85)') + '; box-shadow:' + (isShown ? '0 0 8px rgba(62,224,122,.7)' : 'none') + ';',
      thumbNode: this.thumbs[pl.id]
        ? React.createElement('img', { src: this.thumbs[pl.id], alt: pl.name, draggable: false, onDragStart: (e) => e.preventDefault(), style: { width: '100%', height: '100%', objectFit: 'cover', objectPosition: 'top center', display: 'block', pointerEvents: 'none', userSelect: 'none', WebkitUserDrag: 'none' } })
        : null,
      noThumb: !this.thumbs[pl.id],
      sizeLabel: this.fmtSize(pl.size),
      dateLabel: this.fmtDate(pl.addedAt),
      open: () => this.navTo('Visor de Plano (No tocar).dc.html', { project: this.pid, plan: pl.id }),
      remove: async (e) => {
        e.stopPropagation();
        if (!window.confirm('¿Eliminar el plano "' + pl.name + '"? Esta acción no se puede deshacer.')) return;
        const rest = this.state.plans.filter((x) => x.id !== pl.id);
        const key = pl.blobKey || pl.id;
        if (!pl.src && !rest.some((x) => (x.blobKey || x.id) === key)) await this.delBlob(key);
        delete this.thumbs[pl.id];
        this.savePlans(rest);
        if (this.countRef.current) this.countRef.current.textContent = '(' + rest.length + ')';
      },
    });
    });
    const ap = this.activePlan();
    const apPlan = ap ? (plans.find((p) => p.id === ap.plan) || null) : null;
    let cuts3d = [];
    try { cuts3d = JSON.parse(localStorage.getItem('agd_up3d_' + this.pid) || '[]') || []; } catch (e) {}
    let cutMarks = [];
    try { cutMarks = JSON.parse(localStorage.getItem('agd_cutmarks_' + this.pid) || '[]') || []; } catch (e) {}
    const cutMarkSet = new Set(cutMarks);
    const planNameOf = (id) => { const p = this.state.plans.find((x) => x.id === id); return p ? p.name : ''; };
    const cuts = cuts3d.map((c) => ({
      name: c.name,
      planLabel: planNameOf(c.plan),
      marked: cutMarkSet.has(c.id),
      shownTitle: cutMarkSet.has(c.id) ? 'Marcada para 3D — clic para quitar' : 'Marcar para ver en 3D',
      cardStyle: 'position:relative; user-select:none; border:1px solid ' + (cutMarkSet.has(c.id) ? '#16c8d0' : 'rgba(22,200,208,.35)') + '; background:rgba(20,40,46,.5); border-radius:5px; overflow:hidden; cursor:pointer; transition:border-color .15s; backdrop-filter:blur(8px); box-shadow:' + (cutMarkSet.has(c.id) ? '0 0 0 1px #16c8d0, 0 6px 20px rgba(0,0,0,.3)' : '0 6px 20px rgba(0,0,0,.3)') + ';',
      toggleStyle: 'position:absolute; top:8px; left:8px; z-index:6; width:26px; height:20px; border-radius:5px; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:background .15s, border-color .15s; border:1px solid ' + (cutMarkSet.has(c.id) ? '#16c8d0' : 'rgba(255,255,255,.45)') + '; background:' + (cutMarkSet.has(c.id) ? '#16c8d0' : 'rgba(120,128,130,.85)') + '; box-shadow:' + (cutMarkSet.has(c.id) ? '0 0 8px rgba(22,200,208,.7)' : 'none') + ';',
      toggleMark: (e) => { e.stopPropagation(); this.toggleCutMark(c.id); },
      thumbNode: this.thumbs[c.plan]
        ? React.createElement('img', { src: this.thumbs[c.plan], alt: c.name, draggable: false, onDragStart: (e) => e.preventDefault(), style: { width: '76%', height: '76%', objectFit: 'cover', objectPosition: 'top center', display: 'block', pointerEvents: 'none', userSelect: 'none', borderRadius: '3px', boxShadow: '0 10px 24px rgba(0,0,0,.55)', transform: 'rotateX(52deg) rotateZ(-2deg)', border: '1px solid rgba(22,200,208,.4)' } })
        : null,
      noThumb: !this.thumbs[c.plan],
      open: () => { try { localStorage.setItem('agd_activecut_' + this.pid, c.id); } catch (e) {} this.navTo('Visor de Plano (No tocar).dc.html', { project: this.pid, plan: c.plan, cut: c.id }); },
      remove: (e) => {
        e.stopPropagation();
        if (!window.confirm('¿Eliminar la vista 3D "' + c.name + '"?')) return;
        const rest = cuts3d.filter((x) => x.id !== c.id);
        try { localStorage.setItem('agd_up3d_' + this.pid, JSON.stringify(rest)); } catch (e) {}
        this.forceUpdate();
      },
    }));
    const markedCutId = cutMarks.filter((id) => cuts3d.some((c) => c.id === id)).slice(-1)[0] || null;
    const markedCut = markedCutId ? cuts3d.find((c) => c.id === markedCutId) : null;
    const can3d = !!markedCut;
    return {
      plans,
      cuts,
      hasCuts: cuts.length > 0,
      cutCount: cuts.length,
      hasOpenPlan: !!ap,
      selectMode: this.state.selectMode,
      confirmStyle: 'width:34px; height:34px; display:flex; align-items:center; justify-content:center; border-radius:7px; cursor:pointer; transition:background .15s, border-color .15s, color .15s, box-shadow .15s; border:1px solid ' + (plans.some((p) => p.shown) ? '#3ee07a' : 'rgba(255,255,255,.22)') + '; background:' + (plans.some((p) => p.shown) ? '#3ee07a' : 'rgba(16,20,22,.95)') + '; color:' + (plans.some((p) => p.shown) ? '#06210f' : 'rgba(255,255,255,.45)') + '; box-shadow:' + (plans.some((p) => p.shown) ? '0 0 10px rgba(62,224,122,.6)' : 'none') + ';',
      allLabel: (plans.length > 0 && plans.every((p) => p.shown)) ? 'Quitar todos' : 'Marcar todos',
      allTitle: (plans.length > 0 && plans.every((p) => p.shown)) ? 'Desmarcar todos' : 'Marcar todos',
      allBtnStyle: 'height:34px; padding:0 14px; display:flex; align-items:center; border-radius:7px; cursor:pointer; font-size:12.5px; font-weight:600; transition:background .15s, border-color .15s, color .15s; border:1px solid rgba(255,255,255,.22); background:rgba(16,20,22,.95); color:rgba(255,255,255,.85);',
      toggleAll: () => this.setAllShown(!(this.state.plans.length > 0 && this.shownTabIds().size >= this.state.plans.length)),
      exitSelect: () => this.setState({ selectMode: false }),
      planoBoxStyle: 'flex:1; min-width:0; display:flex; align-items:center; justify-content:center; height:56px; border-radius:12px; background:transparent; border:1.5px dashed rgba(255,255,255,.28); transition:border-color .15s, opacity .15s; ' + (ap ? 'cursor:pointer; opacity:1; pointer-events:auto;' : 'cursor:default; opacity:.32; pointer-events:none;'),
      plano3dBoxStyle: 'flex:1; min-width:0; display:flex; align-items:center; justify-content:center; height:56px; border-radius:12px; background:transparent; border:1.5px dashed rgba(22,200,208,.4); transition:border-color .15s, opacity .15s; ' + (can3d ? 'cursor:pointer; opacity:1; pointer-events:auto;' : 'cursor:default; opacity:.32; pointer-events:none;'),
      goLast3d: () => {
        if (markedCut) { try { localStorage.setItem('agd_activecut_' + this.pid, markedCut.id); } catch (e) {} this.navTo('Visor de Plano (No tocar).dc.html', { project: this.pid, plan: markedCut.plan, cut: markedCut.id }); }
      },
      openPlanName: apPlan ? apPlan.name : '',
      isEmpty: plans.length === 0,
      crumbRef: this.crumbRef, projRightRef: this.projRightRef,
      fileRef: this.fileRef, dropRef: this.dropRef, countRef: this.countRef,

      goProjects: () => { const u = new URL(location.href); u.pathname = u.pathname.replace(/[^/]+$/, 'HOME.dc.html'); u.search = ''; location.href = u.toString(); },
      logout: () => { if (!window.confirm('¿Cerrar sesión?')) return; try { window.localStorage.removeItem('evm_auth'); } catch (e) {} const u = new URL(location.href); u.pathname = u.pathname.replace(/[^/]+$/, 'EVM.dc.html'); u.search = ''; location.href = u.toString(); },
      toggleSound: () => this.toggleSound(),
      toggleFullscreen: () => { try { const d = document, el = d.documentElement; const fsEl = d.fullscreenElement || d.webkitFullscreenElement; if (fsEl) { (d.exitFullscreen || d.webkitExitFullscreen).call(d); } else { const req = el.requestFullscreen || el.webkitRequestFullscreen; if (req) { const p = req.call(el); if (p && p.catch) p.catch(() => {}); } } } catch (e) {} },
      goBuilds: () => this.navTo('HOME.dc.html', { builds: '1' }),
      goReporte: () => this.navTo('Reporte.dc.html', { id: this.pid }),
      goPrecios: () => this.navTo('Precios.dc.html', { id: this.pid }),
      wsIconRef: this.wsIconRef, wsNameRef: this.wsNameRef, wsMenuRef: this.wsMenuRef, soundBtnRef: this.soundBtnRef,
      toggleWsMenu: () => {
        const m = this.wsMenuRef.current; if (!m) return;
        const open = m.style.display !== 'none';
        if (open) { this.closeWsMenu(); return; }
        this.buildWsUI();
        m.style.display = 'block';
        this._wsDoc = (ev) => { if (!m.contains(ev.target) && !ev.target.closest('[title="Cambiar espacio de trabajo"]')) this.closeWsMenu(); };
        setTimeout(() => document.addEventListener('mousedown', this._wsDoc), 0);
      },
      planoBtnRef: this.planoBtnRef,
      planoBackRef: this.planoBackRef,
      objBtnRef: this.objBtnRef,
      goLastObjetos: () => { const ap = this.activePlan(); if (ap) this.navTo('Visor de Plano (No tocar).dc.html', ap.empty ? { project: ap.project, empty: '1', view: 'items' } : { project: ap.project, plan: ap.plan, view: 'items' }); },
      goLastPlan: () => { const ap = this.activePlan(); if (ap) this.navTo('Visor de Plano (No tocar).dc.html', ap.empty ? { project: ap.project, empty: '1' } : { project: ap.project, plan: ap.plan }); },
      goUploadPlans: () => { const ap = this.activePlan(); if (ap) this.navTo('Visor proyecto (No tocar).dc.html', { id: ap.project }); },
      pick: () => this.fileRef.current?.click(),
      onFiles: (e) => { this.addFiles(e.target.files); e.target.value = ''; },
      onDragOver: (e) => { e.preventDefault(); if (this.dropRef.current) { this.dropRef.current.style.borderColor = '#16c8d0'; this.dropRef.current.style.background = 'rgba(22,200,208,.10)'; } },
      onDragLeave: () => { if (this.dropRef.current) { this.dropRef.current.style.borderColor = 'rgba(255,255,255,.28)'; this.dropRef.current.style.background = 'rgba(255,255,255,.04)'; } },
      onDrop: (e) => {
        e.preventDefault();
        if (this.dropRef.current) { this.dropRef.current.style.borderColor = '#44604c'; this.dropRef.current.style.background = 'transparent'; }
        if (e.dataTransfer?.files?.length) this.addFiles(e.dataTransfer.files);
      },
    };
  }
  componentDidUpdate() {
    if (this.countRef.current) this.countRef.current.textContent = '(' + this.state.plans.length + ')';
  }
}
</script>
