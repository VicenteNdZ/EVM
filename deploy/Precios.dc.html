<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<script src="evm-ns.js"></script>
<script src="sfx.js"></script>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; height: 100%; background: #06120f; }
  * { box-sizing: border-box; }
  .prc-scroll::-webkit-scrollbar { width: 10px; height: 10px; }
  .prc-scroll::-webkit-scrollbar-thumb { background: rgba(143,240,160,.3); border-radius: 6px; }
  .prc-in { width: 108px; height: 30px; padding: 0 9px; border-radius: 7px; border: 1px solid rgba(255,255,255,.25); background: rgba(0,0,0,.4); color: #eafff0; font-family: ui-monospace, monospace; font-size: 13px; font-weight: 700; outline: none; text-align: right; }
  .prc-in:focus { border-color: rgba(143,240,160,.7); }
  .prc-sel { height: 30px; padding: 0 6px; border-radius: 7px; border: 1px solid rgba(255,255,255,.25); background: #0d1f18; color: #cfeeda; font-family: 'IBM Plex Sans', sans-serif; font-size: 12px; font-weight: 700; outline: none; }
</style>
</helmet>
<div style="position:fixed; inset:0; display:flex; flex-direction:column; background:radial-gradient(circle at 60% 20%, #103a2a 0%, #0a231a 55%, #06120f 100%); color:#e8e8e8; font-family:'IBM Plex Sans',ui-sans-serif,system-ui,sans-serif;">

  <div style="flex:none; height:54px; box-sizing:border-box; display:flex; align-items:center; gap:12px; padding:0 28px; border-bottom:2px solid #c9d0d8; background:linear-gradient(100deg, #06140f 0%, #0c2c20 45%, #14503a 75%, #1a7a56 100%); white-space:nowrap;">
    <button onClick="{{ toggleSound }}" ref="{{ soundBtnRef }}" title="Sonido" style="flex:none; width:34px; height:34px; display:flex; align-items:center; justify-content:center; border:none; background:transparent; color:#8ff0a0; cursor:pointer; padding:0;" style-hover="color:#c8ffd4;"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5L6 9H2v6h4l5 4z"></path><path d="M15.5 8.5a5 5 0 0 1 0 7"></path><path d="M18.5 6a8 8 0 0 1 0 12"></path></svg></button>
    <button onClick="{{ toggleFullscreen }}" title="Pantalla completa" style="flex:none; width:34px; height:34px; display:flex; align-items:center; justify-content:center; border:none; background:transparent; color:#8ff0a0; cursor:pointer; padding:0;" style-hover="color:#c8ffd4;"><svg width="20" height="20" viewBox="0 0 16 16" fill="none"><path d="M2 6V2.5h3.5M14 6V2.5h-3.5M2 10v3.5h3.5M14 10v3.5h-3.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
    <button onClick="{{ goProjects }}" title="Projects" style="flex:none; width:34px; height:34px; display:flex; align-items:center; justify-content:center; border:none; background:transparent; color:#8ff0a0; cursor:pointer; padding:0;" style-hover="color:#ffffff;"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"><path d="M3 11l9-7 9 7"></path><path d="M5 9.5V20h14V9.5"></path><path d="M10 20v-5h4v5"></path></svg></button>
    <button onClick="{{ goPlan }}" title="Plano" style="flex:none; width:34px; height:34px; display:flex; align-items:center; justify-content:center; border:none; background:transparent; color:#8ff0a0; cursor:pointer; padding:0;" style-hover="color:#ffffff;"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round" stroke-linecap="round"><path d="M9 4L3 6.5v13.5l6-2.5 6 2.5 6-2.5V3l-6 2.5z"></path><path d="M9 4v13.5"></path><path d="M15 6.5V20"></path></svg></button>
    <div style="flex:1;"></div>
    <span ref="{{ projRightRef }}" style="flex:none; max-width:260px; font-family:Arial,sans-serif; font-weight:700; font-size:18px; color:#ffffff; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;"></span>
    <div style="width:1px; height:22px; background:rgba(143,240,160,.3); margin:0 2px;"></div>
    <button onClick="{{ goBuild }}" title="Build" style="flex:none; width:34px; height:34px; display:flex; align-items:center; justify-content:center; border:none; background:transparent; color:#8ff0a0; cursor:pointer; padding:0;" style-hover="color:#ffffff;"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round"><rect x="3" y="3" width="7" height="7" rx="1"></rect><rect x="14" y="3" width="7" height="7" rx="1"></rect><rect x="3" y="14" width="7" height="7" rx="1"></rect><rect x="14" y="14" width="7" height="7" rx="1"></rect></svg></button>
    <button title="Precios" style="flex:none; width:34px; height:34px; display:flex; align-items:center; justify-content:center; border:none; background:transparent; color:#ffffff; cursor:default; padding:0;"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round" stroke-linecap="round"><path d="M12 1v22"></path><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg></button>
    <button onClick="{{ goReporte }}" title="Reporte" style="flex:none; width:34px; height:34px; display:flex; align-items:center; justify-content:center; border:none; background:transparent; color:#8ff0a0; cursor:pointer; padding:0;" style-hover="color:#ffffff;"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round" stroke-linecap="round"><path d="M9 2h6l4 4v14a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1V3a1 1 0 0 1 1-1z"></path><path d="M14 2v5h5"></path><path d="M8 13h8"></path><path d="M8 17h8"></path><path d="M8 9h3"></path></svg></button>
  </div>

  <div style="flex:none; display:flex; gap:10px; padding:14px 44px 0;">
    <button ref="{{ tabMktRef }}" onClick="{{ showMkt }}" style="height:38px; padding:0 20px; border-radius:9px 9px 0 0; border:none; cursor:pointer; font-family:'Oswald',sans-serif; font-size:15px; font-weight:600; letter-spacing:.04em; text-transform:uppercase;">Precios de mercado</button>
    <button ref="{{ tabSubRef }}" onClick="{{ showSub }}" style="height:38px; padding:0 20px; border-radius:9px 9px 0 0; border:none; cursor:pointer; font-family:'Oswald',sans-serif; font-size:15px; font-weight:600; letter-spacing:.04em; text-transform:uppercase;">Subcontratistas</button>
  </div>

  <div ref="{{ bodyRef }}" class="prc-scroll" style="flex:1; overflow:auto; padding:20px 44px 70px;"></div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  BKEY = 'agd_builds_v1';
  MKEY = 'agd_market_v1';      // { [itemId]: { base, unit } }
  SKEY = 'agd_subs_v1';        // [ { id, name, prices:{[itemId]:num} } ]
  bodyRef = React.createRef();
  projRightRef = React.createRef();
  soundBtnRef = React.createRef();
  tabMktRef = React.createRef();
  tabSubRef = React.createRef();
  state = { tab: 'mkt' };

  pid() {
    const q = new URLSearchParams(location.search);
    const p = q.get('project') || q.get('id');
    if (p) { try { localStorage.setItem('agd_calc_project', p); } catch (e) {} return p; }
    try { return localStorage.getItem('agd_calc_project'); } catch (e) { return null; }
  }
  navTo(file, params) {
    const u = new URL(location.href);
    u.pathname = u.pathname.replace(/[^/]+$/, file);
    u.search = '';
    if (params) Object.keys(params).forEach((k) => u.searchParams.set(k, params[k]));
    location.href = u.toString();
  }
  fmtMoney(n) { if (n == null || !isFinite(n)) return '—'; return '$' + (Math.round(n * 100) / 100).toLocaleString('es', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
  projectName(pid) { try { const all = JSON.parse(localStorage.getItem('agd_projects_v1') || '[]'); const p = (all || []).find((x) => x.id === pid); return p ? p.name : ''; } catch (e) { return ''; } }
  activeBuild() {
    let builds = [];
    try { builds = JSON.parse(localStorage.getItem(this.BKEY) || '[]'); } catch (e) { builds = []; }
    if (!Array.isArray(builds) || !builds.length) return null;
    return builds.find((b) => b.isDefault) || builds[0];
  }
  readMkt() { try { const v = JSON.parse(localStorage.getItem(this.MKEY) || '{}'); return (v && typeof v === 'object') ? v : {}; } catch (e) { return {}; } }
  writeMkt(m) { try { localStorage.setItem(this.MKEY, JSON.stringify(m)); } catch (e) {} }
  readSubs() { try { const v = JSON.parse(localStorage.getItem(this.SKEY) || '[]'); return Array.isArray(v) ? v : []; } catch (e) { return []; } }
  writeSubs(s) { try { localStorage.setItem(this.SKEY, JSON.stringify(s)); } catch (e) {} }
  today() { const d = new Date(); return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0'); }
  normHist(val) { if (val == null || val === '') return []; if (Array.isArray(val)) return val.filter((x) => x && typeof x === 'object'); return [{ v: val, date: null }]; }
  subHist(sub, itemId) { return this.normHist(sub && sub.prices ? sub.prices[itemId] : null); }
  readPick() { try { const v = JSON.parse(localStorage.getItem('agd_pricepick_v1') || '{}'); return (v && typeof v === 'object') ? v : {}; } catch (e) { return {}; } }
  writePick(p) { try { localStorage.setItem('agd_pricepick_v1', JSON.stringify(p)); } catch (e) {} }
  readProfit() { try { const v = localStorage.getItem('agd_profit_v1'); return v == null ? '' : v; } catch (e) { return ''; } }
  writeProfit(v) { try { localStorage.setItem('agd_profit_v1', String(v)); } catch (e) {} }
  mktHist(itemId) { const m = this.readMkt(); return this.normHist(m[itemId] ? m[itemId].hist : null); }
  async aiUpdateAll(btn) {
    if (btn._busy) return; btn._busy = true; const orig = btn.innerHTML;
    const g = this.groupsAndItems(); if (!g) { btn._busy = false; return; }
    const items = g.b.items;
    let done = 0;
    for (let i = 0; i < items.length; i++) {
      btn.innerHTML = '<span style="font-size:12px;">Actualizando ' + (i + 1) + '/' + items.length + '…</span>';
      try { await this.aiSearchMarket(items[i], null, { _silent: true }); done++; } catch (e) {}
    }
    btn._busy = false; btn.innerHTML = orig; this.render0();
    alert('Precios actualizados por IA: ' + done + ' de ' + items.length + '. Todos con fecha ' + this.today() + '.');
  }
  async aiSearchMarket(it, inp, btn) {
    if (btn && btn._busy) return;
    if (btn && !btn._silent) btn._busy = true;
    const orig = btn && !btn._silent ? btn.innerHTML : '';
    if (btn && !btn._silent) btn.innerHTML = '<span style="font-size:11px;">…</span>';
    try {
      if (!(window.claude && window.claude.complete)) { if (!(btn && btn._silent)) alert('El asistente de IA no está disponible en este momento.'); return; }
      const rec = (this.readMkt()[it.id]) || {};
      const unit = rec.unit || 'pieza';
      const unitTxt = unit === 'lf' ? 'por pie lineal (LF)' : unit === 'sf' ? 'por pie cuadrado (SF)' : 'por pieza/unidad';
      const prompt = 'Eres un estimador de construcción. Da el precio de referencia en DÓLARES (USD) del siguiente material como se vendería en Home Depot en Miami, Florida (EE.UU.), ' + unitTxt + '.\n'
        + 'Material: "' + (it.name || '') + '".\n'
        + 'Responde SOLO un objeto JSON válido, sin texto extra, con esta forma exacta: {"price": <numero>, "note": "<breve nota>"}.\n'
        + 'El precio debe ser un número en USD (sin símbolo). Es un estimado de referencia; si no estás seguro, da tu mejor aproximación de mercado actual.';
      const raw = await window.claude.complete({ messages: [{ role: 'user', content: prompt }], max_tokens: 300 });
      let obj = null;
      try { const m = String(raw).match(/\{[\s\S]*\}/); obj = m ? JSON.parse(m[0]) : null; } catch (e) { obj = null; }
      const price = obj ? parseFloat(obj.price) : NaN;
      if (!isFinite(price)) { if (!(btn && btn._silent)) alert('No pude obtener un precio válido. Intenta de nuevo.'); return; }
      const m = this.readMkt(); m[it.id] = m[it.id] || {};
      m[it.id].base = String(Math.round(price * 100) / 100);
      m[it.id].date = this.today();
      m[it.id].source = 'Home Depot Miami FL (IA, estimado)';
      let a = this.normHist(m[it.id].hist); a.push({ v: m[it.id].base, date: this.today(), source: 'Home Depot Miami FL (IA)' }); m[it.id].hist = a;
      this.writeMkt(m);
      if (inp) inp.value = m[it.id].base;
      if (!(btn && btn._silent)) this.render0();
    } catch (e) {
      if (!(btn && btn._silent)) alert('Error consultando la IA: ' + (e && e.message ? e.message : e)); else throw e;
    } finally {
      if (btn && !btn._silent) { btn._busy = false; btn.innerHTML = orig; }
    }
  }
  uid() { return 's' + Math.random().toString(36).slice(2, 9); }

  componentDidMount() {
    try { if (window.SFX && this.soundBtnRef.current) window.SFX.bindButton(this.soundBtnRef.current); } catch (e) {}
    if (this.projRightRef.current) this.projRightRef.current.textContent = 'Precios de mercado (global)';
    this.paintTabs();
    this.render0();
  }
  paintTabs() {
    const on = 'background:#0d2c20; color:#8ff0a0; box-shadow:inset 0 2px 0 #8ff0a0;';
    const off = 'background:rgba(255,255,255,.05); color:rgba(255,255,255,.5);';
    if (this.tabMktRef.current) this.tabMktRef.current.style.cssText = "height:38px; padding:0 20px; border-radius:9px 9px 0 0; border:none; cursor:pointer; font-family:'Oswald',sans-serif; font-size:15px; font-weight:600; letter-spacing:.04em; text-transform:uppercase; " + (this.state.tab === 'mkt' ? on : off);
    if (this.tabSubRef.current) this.tabSubRef.current.style.cssText = "height:38px; padding:0 20px; border-radius:9px 9px 0 0; border:none; cursor:pointer; font-family:'Oswald',sans-serif; font-size:15px; font-weight:600; letter-spacing:.04em; text-transform:uppercase; " + (this.state.tab === 'sub' ? on : off);
  }
  el(tag, css, txt) { const e = document.createElement(tag); if (css) e.style.cssText = css; if (txt != null) e.textContent = txt; return e; }
  groupsAndItems() {
    const b = this.activeBuild();
    if (!b || !Array.isArray(b.items) || !b.items.length) return null;
    const sets = Array.isArray(b.sets) ? b.sets.slice() : [];
    sets.sort((a, c) => (parseFloat(a.num) || 0) - (parseFloat(c.num) || 0));
    const groups = sets.concat([{ id: '__none', num: '', name: 'Sin bloque' }]);
    return { b: b, sets: sets, groups: groups };
  }
  render0() {
    const root = this.bodyRef.current; if (!root) return;
    root.innerHTML = '';
    if (this.state.tab === 'mkt') this.renderMkt(root); else this.renderSub(root);
  }
  renderMkt(root) {
    const g = this.groupsAndItems();
    if (!g) { root.appendChild(this.el('div', 'color:rgba(255,255,255,.5); font-size:15px; padding:20px 4px;', 'No hay items en la build. Créalos en BUILD.')); return; }
    const mkt = this.readMkt();
    const wrap = this.el('div', 'max-width:1040px; margin:0 auto;');
    root.appendChild(wrap);
    wrap.appendChild(this.el('div', 'font-family:"IBM Plex Sans",sans-serif; font-size:13px; color:rgba(255,255,255,.6); margin:6px 0 14px;', 'Estos precios son globales y sirven para todos los proyectos. El reporte los usa por item.'));
    // barra: % de ganancia global + actualizar todos (IA)
    const bar = this.el('div', 'display:flex; align-items:center; gap:16px; flex-wrap:wrap; margin-bottom:18px; padding:12px 16px; border-radius:12px; background:rgba(10,25,18,.6); border:1px solid rgba(143,240,160,.25);');
    bar.appendChild(this.el('span', 'flex:1; min-width:20px; font-family:"IBM Plex Sans",sans-serif; font-size:12px; color:rgba(255,255,255,.5);', 'El % de ganancia se define por item (columna Profit). El reporte lo aplica a cada uno.'));
    const allBtn = this.el('button', "height:34px; padding:0 16px; border-radius:8px; cursor:pointer; border:1px solid rgba(240,180,80,.6); background:rgba(240,180,80,.16); color:#f0c060; font-family:'IBM Plex Sans',sans-serif; font-size:13px; font-weight:800; display:flex; align-items:center; gap:7px;");
    allBtn.innerHTML = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-3-6.7"></path><path d="M21 3v5h-5"></path></svg><span>Actualizar todos (IA)</span>';
    allBtn.onclick = () => this.aiUpdateAll(allBtn);
    bar.appendChild(allBtn);
    wrap.appendChild(bar);
    g.groups.forEach((set) => {
      const items = g.b.items.filter((it) => (set.id === '__none') ? (!it.setId || !g.sets.some((s) => s.id === it.setId)) : (it.setId === set.id));
      if (!items.length) return;
      const card = this.el('div', 'margin-bottom:22px; border-radius:14px; overflow:hidden; border:1px solid rgba(255,255,255,.14); background:rgba(10,25,18,.5);');
      const sh = this.el('div', 'display:flex; align-items:center; gap:12px; padding:11px 18px; background:linear-gradient(100deg,#0c2c20,#14503a); border-bottom:1px solid rgba(143,240,160,.25);');
      if (set.num !== '' && set.num != null) sh.appendChild(this.el('span', "flex:none; font-family:'Oswald',sans-serif; font-size:16px; font-weight:700; color:#8ff0a0; min-width:34px;", String(set.num).padStart(2, '0')));
      sh.appendChild(this.el('span', "flex:1; font-family:'Oswald',sans-serif; font-size:16px; font-weight:600; letter-spacing:.03em; color:#fff; text-transform:uppercase;", set.name || 'Bloque'));
      card.appendChild(sh);
      const chd = this.el('div', 'display:flex; gap:12px; padding:7px 18px; border-bottom:1px solid rgba(255,255,255,.1);');
      chd.appendChild(this.el('span', 'flex:1; min-width:0; font-family:"IBM Plex Sans",sans-serif; font-size:9.5px; letter-spacing:.1em; font-weight:800; color:rgba(255,255,255,.4);', 'Item'));
      chd.appendChild(this.el('span', 'flex:none; width:118px; text-align:right; font-family:"IBM Plex Sans",sans-serif; font-size:9.5px; letter-spacing:.1em; font-weight:800; color:rgba(143,240,160,.7);', 'Precio base'));
      chd.appendChild(this.el('span', 'flex:none; width:96px; text-align:center; font-family:"IBM Plex Sans",sans-serif; font-size:9.5px; letter-spacing:.1em; font-weight:800; color:rgba(255,255,255,.4);', 'Unidad'));
      chd.appendChild(this.el('span', 'flex:none; width:72px; text-align:center; font-family:"IBM Plex Sans",sans-serif; font-size:9.5px; letter-spacing:.1em; font-weight:800; color:rgba(240,192,96,.75);', 'Profit %'));
      chd.appendChild(this.el('span', 'flex:none; width:150px; text-align:center; font-family:"IBM Plex Sans",sans-serif; font-size:9.5px; letter-spacing:.1em; font-weight:800; color:rgba(255,255,255,.4);', 'Fuente para reporte'));
      chd.appendChild(this.el('span', 'flex:none; width:60px; text-align:center; font-family:"IBM Plex Sans",sans-serif; font-size:9.5px; letter-spacing:.1em; font-weight:800; color:rgba(240,192,96,.7);', 'IA'));
      chd.appendChild(this.el('span', 'flex:none; width:56px; text-align:center; font-family:"IBM Plex Sans",sans-serif; font-size:9.5px; letter-spacing:.1em; font-weight:800; color:rgba(143,240,160,.6);', 'Hist.'));
      card.appendChild(chd);
      items.forEach((it) => {
        const row = this.el('div', 'display:flex; align-items:center; gap:12px; padding:8px 18px; border-bottom:1px solid rgba(255,255,255,.05);');
        row.appendChild(this.el('span', 'flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-family:"IBM Plex Sans",sans-serif; font-size:14px; font-weight:700; color:#e6eaee;', (it.num != null && it.num !== '' ? it.num + ' · ' : '') + (it.name || 'Item')));
        const rec = mkt[it.id] || {};
        const inp = document.createElement('input'); inp.type = 'text'; inp.inputMode = 'decimal'; inp.className = 'prc-in'; inp.placeholder = '0.00';
        inp.value = (rec.base != null ? rec.base : '');
        inp.oninput = () => { const m = this.readMkt(); m[it.id] = m[it.id] || {}; m[it.id].base = inp.value; this.writeMkt(m); };
        const sel = document.createElement('select'); sel.className = 'prc-sel';
        [['pieza', '$/pieza'], ['lf', '$/LF'], ['sf', '$/SF']].forEach((u) => { const o = document.createElement('option'); o.value = u[0]; o.textContent = u[1]; sel.appendChild(o); });
        sel.value = rec.unit || 'pieza';
        sel.onchange = () => { const m = this.readMkt(); m[it.id] = m[it.id] || {}; m[it.id].unit = sel.value; this.writeMkt(m); };
        const iw = this.el('span', 'flex:none; width:118px; display:flex; justify-content:flex-end;'); iw.appendChild(inp);
        const sw = this.el('span', 'flex:none; width:96px; display:flex; justify-content:center;'); sw.appendChild(sel);
        row.appendChild(iw); row.appendChild(sw);
        // profit % por item
        const pin2 = document.createElement('input'); pin2.type = 'text'; pin2.inputMode = 'decimal'; pin2.className = 'prc-in'; pin2.style.width = '62px'; pin2.style.textAlign = 'center'; pin2.placeholder = '0';
        pin2.value = (rec.profit != null ? rec.profit : '');
        pin2.oninput = () => { const m = this.readMkt(); m[it.id] = m[it.id] || {}; m[it.id].profit = pin2.value; this.writeMkt(m); };
        const pw = this.el('span', 'flex:none; width:72px; display:flex; justify-content:center;'); pw.appendChild(pin2);
        row.appendChild(pw);
        // fuente para el reporte: mercado o un subcontratista
        const src = document.createElement('select'); src.className = 'prc-sel'; src.style.width = '148px';
        const pick = this.readPick();
        const o0 = document.createElement('option'); o0.value = 'market'; o0.textContent = 'Mercado'; src.appendChild(o0);
        this.readSubs().forEach((sb) => { const o = document.createElement('option'); o.value = sb.id; o.textContent = sb.name || 'Subcontratista'; src.appendChild(o); });
        src.value = pick[it.id] || 'market';
        src.onchange = () => { const p = this.readPick(); p[it.id] = src.value; this.writePick(p); };
        const scw = this.el('span', 'flex:none; width:150px; display:flex; justify-content:center;'); scw.appendChild(src);
        row.appendChild(scw);
        const aiBtn = this.el('button', 'flex:none; height:30px; padding:0 11px; border-radius:7px; cursor:pointer; border:1px solid rgba(240,180,80,.6); background:rgba(240,180,80,.14); color:#f0c060; font-family:"IBM Plex Sans",sans-serif; font-size:11.5px; font-weight:800; display:flex; align-items:center; gap:5px; white-space:nowrap;');
        aiBtn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l1.9 4.5L18.5 9l-4.6 1.5L12 15l-1.9-4.5L5.5 9l4.6-1.5z"></path></svg><span>IA</span>';
        const acw = this.el('span', 'flex:none; width:60px; display:flex; justify-content:center;'); acw.appendChild(aiBtn);
        aiBtn.onclick = () => this.aiSearchMarket(it, inp, aiBtn);
        row.appendChild(acw);
        // historial de precios del item (manual + IA), con fecha
        const hist = this.mktHist(it.id);
        const hbtn = this.el('button', 'flex:none; height:30px; padding:0 9px; border-radius:7px; cursor:pointer; border:1px solid rgba(143,240,160,.4); background:rgba(143,240,160,.08); color:#8ff0a0; font-family:"IBM Plex Sans",sans-serif; font-size:11px; font-weight:700; display:flex; align-items:center; gap:5px;');
        hbtn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"></circle><path d="M12 7v5l3 2"></path></svg><span>' + hist.length + '</span>';
        const hcw = this.el('span', 'flex:none; width:56px; display:flex; justify-content:center;'); hcw.appendChild(hbtn);
        row.appendChild(hcw);
        card.appendChild(row);
        const hpanel = this.el('div', 'display:none; padding:4px 18px 12px 30px; background:rgba(0,0,0,.22);');
        const buildH = () => {
          hpanel.innerHTML = '';
          const arr = this.mktHist(it.id);
          if (!arr.length) hpanel.appendChild(this.el('div', 'font-family:"IBM Plex Sans",sans-serif; font-size:11.5px; color:rgba(255,255,255,.4); padding:4px 0;', 'Sin historial todavía.'));
          arr.slice().reverse().forEach((e, ri) => {
            const realIdx = arr.length - 1 - ri;
            const hr = this.el('div', 'display:flex; align-items:center; gap:10px; padding:4px 0; border-bottom:1px solid rgba(255,255,255,.05);');
            hr.appendChild(this.el('span', 'flex:1; font-family:"IBM Plex Sans",sans-serif; font-size:11.5px; color:rgba(255,255,255,.5);', (e.date || '—') + (e.source ? '  ·  ' + e.source : '') + (realIdx === arr.length - 1 ? '   · actual' : '')));
            hr.appendChild(this.el('span', 'flex:none; font-family:ui-monospace,monospace; font-size:13px; font-weight:700; color:#cfeeda;', this.fmtMoney(parseFloat(String(e.v).replace(',', '.')))));
            const rm = this.el('button', 'flex:none; width:22px; height:22px; border-radius:5px; cursor:pointer; border:1px solid rgba(220,38,38,.5); background:rgba(220,38,38,.12); color:#ff6a6a; font-size:13px; line-height:1; padding:0;', '×');
            rm.onclick = () => { const m = this.readMkt(); m[it.id] = m[it.id] || {}; let a = this.normHist(m[it.id].hist); a.splice(realIdx, 1); m[it.id].hist = a; this.writeMkt(m); this.render0(); };
            hr.appendChild(rm); hpanel.appendChild(hr);
          });
          const addP = this.el('button', "margin-top:8px; height:30px; padding:0 12px; border-radius:7px; cursor:pointer; border:1px dashed rgba(143,240,160,.5); background:transparent; color:#8ff0a0; font-family:'IBM Plex Sans',sans-serif; font-size:12px; font-weight:700;", '+ Guardar precio actual en historial');
          addP.onclick = () => { const m = this.readMkt(); m[it.id] = m[it.id] || {}; const cur = (m[it.id].base != null && m[it.id].base !== '') ? m[it.id].base : (inp.value || ''); if (cur === '') return; let a = this.normHist(m[it.id].hist); a.push({ v: cur, date: this.today(), source: 'Manual' }); m[it.id].hist = a; this.writeMkt(m); this.render0(); };
          hpanel.appendChild(addP);
        };
        hbtn.onclick = () => { const open = hpanel.style.display !== 'none'; if (open) hpanel.style.display = 'none'; else { buildH(); hpanel.style.display = 'block'; } };
        card.appendChild(hpanel);
        if (rec.date || rec.source) {
          const meta = this.el('div', 'padding:0 18px 8px; margin-top:-2px; font-family:"IBM Plex Sans",sans-serif; font-size:10.5px; color:rgba(255,255,255,.4);', 'Últ. actualización: ' + (rec.date || '—') + (rec.source ? ' · ' + rec.source : ''));
          card.appendChild(meta);
        }
      });
      wrap.appendChild(card);
    });
  }
  renderSub(root) {
    const g = this.groupsAndItems();
    const wrap = this.el('div', 'max-width:1000px; margin:0 auto;');
    root.appendChild(wrap);
    const top = this.el('div', 'display:flex; align-items:center; gap:14px; margin:6px 0 18px;');
    top.appendChild(this.el('span', 'flex:1; font-family:"IBM Plex Sans",sans-serif; font-size:13px; color:rgba(255,255,255,.6);', 'Guarda cotizaciones de subcontratistas por item. Puedes compararlas y usarlas en el reporte.'));
    const add = this.el('button', "flex:none; height:36px; padding:0 16px; border-radius:9px; cursor:pointer; border:1px solid rgba(143,240,160,.6); background:rgba(143,240,160,.16); color:#8ff0a0; font-family:'IBM Plex Sans',sans-serif; font-size:13px; font-weight:800;", '+ Subcontratista');
    add.onclick = () => { const s = this.readSubs(); s.push({ id: this.uid(), name: 'Nuevo subcontratista', prices: {} }); this.writeSubs(s); this.render0(); };
    top.appendChild(add);
    wrap.appendChild(top);
    const subs = this.readSubs();
    if (!subs.length) { wrap.appendChild(this.el('div', 'color:rgba(255,255,255,.5); font-size:15px; padding:16px 4px;', 'Aún no hay subcontratistas. Agrega uno con el botón de arriba.')); return; }
    if (!g) { wrap.appendChild(this.el('div', 'color:rgba(255,255,255,.5); font-size:15px; padding:16px 4px;', 'No hay items en la build para cotizar.')); return; }
    subs.forEach((sub) => {
      const card = this.el('div', 'margin-bottom:22px; border-radius:14px; overflow:hidden; border:1px solid rgba(255,255,255,.14); background:rgba(10,25,18,.5);');
      const sh = this.el('div', 'display:flex; align-items:center; gap:12px; padding:11px 16px; background:linear-gradient(100deg,#0c2c20,#14503a); border-bottom:1px solid rgba(143,240,160,.25);');
      const nm = document.createElement('input'); nm.type = 'text'; nm.value = sub.name || '';
      nm.style.cssText = "flex:1; min-width:0; height:34px; padding:0 12px; border-radius:8px; border:1px solid rgba(255,255,255,.25); background:rgba(0,0,0,.35); color:#fff; font-family:'Oswald',sans-serif; font-size:16px; font-weight:600; letter-spacing:.03em; outline:none;";
      nm.oninput = () => { const s = this.readSubs(); const f = s.find((x) => x.id === sub.id); if (f) { f.name = nm.value; this.writeSubs(s); } };
      const del = this.el('button', 'flex:none; width:34px; height:34px; display:flex; align-items:center; justify-content:center; border-radius:8px; cursor:pointer; border:1px solid rgba(220,38,38,.6); background:rgba(220,38,38,.14); color:#ff6a6a; padding:0;');
      del.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M8 6V4a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2"></path><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path></svg>';
      del.onclick = () => { if (!confirm('¿Eliminar subcontratista "' + (sub.name || '') + '"?')) return; let s = this.readSubs(); s = s.filter((x) => x.id !== sub.id); this.writeSubs(s); this.render0(); };
      sh.appendChild(nm); sh.appendChild(del);
      card.appendChild(sh);
      g.groups.forEach((set) => {
        const items = g.b.items.filter((it) => (set.id === '__none') ? (!it.setId || !g.sets.some((s) => s.id === it.setId)) : (it.setId === set.id));
        if (!items.length) return;
        card.appendChild(this.el('div', "padding:8px 16px 3px; font-family:'Oswald',sans-serif; font-size:12px; letter-spacing:.06em; font-weight:600; color:rgba(143,240,160,.75); text-transform:uppercase;", (set.num !== '' && set.num != null ? String(set.num).padStart(2, '0') + '  ' : '') + (set.name || '')));
        items.forEach((it) => {
          const hist = this.subHist(sub, it.id);
          const cur = hist.length ? hist[hist.length - 1] : null;
          const row = this.el('div', 'display:flex; align-items:center; gap:12px; padding:6px 16px 6px 26px; border-bottom:1px solid rgba(255,255,255,.05);');
          row.appendChild(this.el('span', 'flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-family:"IBM Plex Sans",sans-serif; font-size:13px; font-weight:600; color:#c7ced5;', (it.num != null && it.num !== '' ? it.num + ' · ' : '') + (it.name || 'Item')));
          const inp = document.createElement('input'); inp.type = 'text'; inp.inputMode = 'decimal'; inp.className = 'prc-in'; inp.placeholder = '0.00';
          inp.value = cur ? (cur.v != null ? cur.v : '') : '';
          inp.oninput = () => {
            const s = this.readSubs(); const f = s.find((x) => x.id === sub.id); if (!f) return;
            f.prices = f.prices || {}; let arr = this.normHist(f.prices[it.id]);
            if (!arr.length) arr = [{ v: inp.value, date: this.today() }]; else arr[arr.length - 1] = { v: inp.value, date: arr[arr.length - 1].date || this.today() };
            f.prices[it.id] = arr; this.writeSubs(s);
          };
          const iw = this.el('span', 'flex:none; width:118px; display:flex; justify-content:flex-end;'); iw.appendChild(inp);
          // botón historial
          const hbtn = this.el('button', 'flex:none; height:30px; padding:0 9px; border-radius:7px; cursor:pointer; border:1px solid rgba(143,240,160,.4); background:rgba(143,240,160,.08); color:#8ff0a0; font-family:"IBM Plex Sans",sans-serif; font-size:11px; font-weight:700; display:flex; align-items:center; gap:5px;');
          hbtn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"></circle><path d="M12 7v5l3 2"></path></svg><span>' + Math.max(0, hist.length) + '</span>';
          const hpanel = this.el('div', 'display:none; width:100%; padding:4px 16px 10px 26px; background:rgba(0,0,0,.22);');
          const buildHist = () => {
            hpanel.innerHTML = '';
            const arr = this.subHist(sub, it.id);
            arr.slice().reverse().forEach((e, ri) => {
              const realIdx = arr.length - 1 - ri;
              const hr = this.el('div', 'display:flex; align-items:center; gap:10px; padding:4px 0; border-bottom:1px solid rgba(255,255,255,.05);');
              hr.appendChild(this.el('span', 'flex:1; font-family:"IBM Plex Sans",sans-serif; font-size:11.5px; color:rgba(255,255,255,.5);', (e.date || '—') + (realIdx === arr.length - 1 ? '  · actual' : '')));
              hr.appendChild(this.el('span', 'flex:none; font-family:ui-monospace,monospace; font-size:13px; font-weight:700; color:#cfeeda;', this.fmtMoney(parseFloat(String(e.v).replace(',', '.')))));
              const rm = this.el('button', 'flex:none; width:22px; height:22px; border-radius:5px; cursor:pointer; border:1px solid rgba(220,38,38,.5); background:rgba(220,38,38,.12); color:#ff6a6a; font-size:13px; line-height:1; padding:0;', '×');
              rm.onclick = () => { const s = this.readSubs(); const f = s.find((x) => x.id === sub.id); if (!f) return; let a = this.normHist(f.prices[it.id]); a.splice(realIdx, 1); f.prices[it.id] = a; this.writeSubs(s); this.render0(); };
              hr.appendChild(rm); hpanel.appendChild(hr);
            });
            const addP = this.el('button', "margin-top:8px; height:30px; padding:0 12px; border-radius:7px; cursor:pointer; border:1px dashed rgba(143,240,160,.5); background:transparent; color:#8ff0a0; font-family:'IBM Plex Sans',sans-serif; font-size:12px; font-weight:700;", '+ Nuevo precio (histórico)');
            addP.onclick = () => { const s = this.readSubs(); const f = s.find((x) => x.id === sub.id); if (!f) return; f.prices = f.prices || {}; let a = this.normHist(f.prices[it.id]); a.push({ v: '', date: this.today() }); f.prices[it.id] = a; this.writeSubs(s); this.render0(); };
            hpanel.appendChild(addP);
          };
          hbtn.onclick = () => { const open = hpanel.style.display !== 'none'; if (open) { hpanel.style.display = 'none'; } else { buildHist(); hpanel.style.display = 'block'; } };
          row.appendChild(iw); row.appendChild(hbtn);
          card.appendChild(row); card.appendChild(hpanel);
        });
      });
      wrap.appendChild(card);
    });
  }
  renderVals() {
    return {
      bodyRef: this.bodyRef, projRightRef: this.projRightRef, soundBtnRef: this.soundBtnRef,
      tabMktRef: this.tabMktRef, tabSubRef: this.tabSubRef,
      showMkt: () => { this.setState({ tab: 'mkt' }, () => { this.paintTabs(); this.render0(); }); },
      showSub: () => { this.setState({ tab: 'sub' }, () => { this.paintTabs(); this.render0(); }); },
      toggleSound: () => { try { if (window.SFX) window.SFX.toggle(); } catch (e) {} },
      toggleFullscreen: () => { try { const d = document, el = d.documentElement; const fsEl = d.fullscreenElement || d.webkitFullscreenElement; if (fsEl) { (d.exitFullscreen || d.webkitExitFullscreen).call(d); } else { (el.requestFullscreen || el.webkitRequestFullscreen).call(el); } } catch (e) {} },
      goProjects: () => this.navTo('HOME.dc.html'),
      goBuild: () => this.navTo('HOME.dc.html', { builds: '1' }),
      goReporte: () => { const pid = this.pid(); this.navTo('Reporte.dc.html', pid ? { id: pid } : null); },
      goPlan: () => { const pid = this.pid(); this.navTo('Visor proyecto (No tocar).dc.html', pid ? { id: pid } : null); },
    };
  }
}
</script>
