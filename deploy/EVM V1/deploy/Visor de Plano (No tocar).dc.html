<!DOCTYPE html>
<html style="background:#120407">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body style="background:#120407; margin:0">
<x-dc>
<helmet>
<script src="supabase-sync.js"></script>
<script src="evm-ns.js"></script>
<script src="sfx.js"></script>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=Marcellus&display=swap" rel="stylesheet" />
<style>
  /* __tungsten_all */ body, button, input, select, textarea, span, div, h1, h2, h3, p { font-family: 'Tungsten','Oswald',ui-sans-serif,system-ui,sans-serif; }
  html, body { margin: 0; height: 100%; background: #233a2b; }
  * { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; text-rendering: optimizeLegibility; }
  [data-hidezone]:hover + [data-hidebtn], [data-hidebtn]:hover { opacity: 1 !important; }
  @keyframes scaleChipIn { from { opacity:0; transform:translateX(-14px) scale(.9); } to { opacity:1; transform:translateX(0) scale(1); } }
  @keyframes scaleChipShine { from { left:-60%; } to { left:130%; } }
  @keyframes objSlideIn { from { opacity:0; transform:translateX(46px); } to { opacity:1; transform:translateX(0); } }
  @keyframes ddSlide { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:translateY(0); } }
  @keyframes ddSlideOut { from { opacity:1; transform:translateY(0); } to { opacity:0; transform:translateY(-8px); } }
</style>
</helmet>
<div style="position:fixed; inset:0; display:flex; flex-direction:column; background:#233a2b; font-family:'Tungsten','Oswald',ui-sans-serif,system-ui,sans-serif;">
  <div style="flex:none; height:54px; box-sizing:border-box; display:flex; align-items:center; gap:12px; padding:0 28px; background:linear-gradient(100deg, #3a0a10 0%, #6a1018 40%, #94161f 72%, #b81d27 100%); border-bottom:2px solid #16c8d0; box-shadow:0 2px 18px rgba(22,200,208,.4); color:#fff; white-space:nowrap;">
    <button onClick="{{ toggleSound }}" ref="{{ soundBtnRef }}" title="Sonido" style="flex:none; width:34px; height:34px; display:flex; align-items:center; justify-content:center; border:none; background:transparent; color:#f0d27a; cursor:pointer; padding:0;" style-hover="color:#ffe49a;"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5L6 9H2v6h4l5 4z"></path><path data-on="1" d="M15.5 8.5a5 5 0 0 1 0 7"></path><path data-on="1" d="M18.5 6a8 8 0 0 1 0 12"></path><path data-off="1" style="display:none" d="M22 9l-5 6M17 9l5 6"></path></svg></button>
    <button onClick="{{ toggleFullscreen }}" title="Pantalla completa" style="flex:none; width:34px; height:34px; display:flex; align-items:center; justify-content:center; border:none; background:transparent; color:#f0d27a; cursor:pointer; padding:0;" style-hover="color:#ffe49a;"><svg width="20" height="20" viewBox="0 0 16 16" fill="none"><path d="M2 6V2.5h3.5M14 6V2.5h-3.5M2 10v3.5h3.5M14 10v3.5h-3.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
    <button onClick="{{ logout }}" title="Cerrar sesión" style="flex:none; width:34px; height:34px; display:flex; align-items:center; justify-content:center; border:none; background:transparent; color:#f0d27a; cursor:pointer; padding:0;" style-hover="color:#ff9aa2;"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><path d="M16 17l5-5-5-5"></path><path d="M21 12H9"></path></svg></button>
    <div style="position:relative;">
      <button onClick="{{ toggleWsMenu }}" title="Cambiar espacio de trabajo" style="flex:none; display:flex; align-items:center; gap:8px; height:32px; padding:0 6px; border-radius:8px; cursor:pointer; font-family:inherit; border:none; background:transparent; color:#fff;" style-hover="color:#f0d27a;">
        <span ref="{{ wsIconRef }}" style="display:flex; align-items:center; color:#f0d27a;"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round" stroke-linecap="round"><circle cx="12" cy="8" r="3.2"></circle><path d="M6.5 20v-1.5a5.5 5.5 0 0 1 11 0V20"></path><circle cx="4.5" cy="9.5" r="2.2"></circle><path d="M1.5 19v-1a4 4 0 0 1 3.4-3.95"></path><circle cx="19.5" cy="9.5" r="2.2"></circle><path d="M22.5 19v-1a4 4 0 0 0-3.4-3.95"></path></svg></span>
      </button>
      <div ref="{{ wsMenuRef }}" style="display:none; position:absolute; top:38px; left:0; min-width:190px; background:#1c0a0e; border:1px solid rgba(22,200,208,.35); border-radius:10px; box-shadow:0 14px 40px rgba(0,0,0,.55); padding:6px; z-index:60;"></div>
    </div>
    <button onClick="{{ goHome }}" title="Projects" style="flex:none; width:34px; height:34px; display:flex; align-items:center; justify-content:center; border:none; background:transparent; color:#f0d27a; cursor:pointer; padding:0;" style-hover="color:#ffffff; filter:drop-shadow(0 0 6px rgba(255,255,255,.8));"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"><path d="M3 11l9-7 9 7"></path><path d="M5 9.5V20h14V9.5"></path><path d="M10 20v-5h4v5"></path></svg></button>
    <button onClick="{{ goProject }}" ref="{{ navPlanoRef }}" title="Planos" style="display:none;"></button>
    <div style="flex:1;"></div>
    <button onClick="{{ showReportView }}" ref="{{ navReportRef }}" style="display:none;"></button>
    <button onClick="{{ showItemsView }}" ref="{{ navItemsRef }}" style="display:none;"></button>
    <span ref="{{ projRightRef }}" style="flex:none; max-width:240px; font-family:Arial,sans-serif; font-weight:700; font-size:18px; letter-spacing:.01em; color:#ffffff; text-shadow:0 0 10px rgba(22,200,208,.35); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; text-align:right;"></span>
    <div style="width:1px; height:22px; background:rgba(240,210,122,.3); margin:0 2px;"></div>
    <button onClick="{{ goBuilds }}" title="Build" style="flex:none; width:34px; height:34px; display:flex; align-items:center; justify-content:center; border:none; background:transparent; color:#f0d27a; cursor:pointer; padding:0;" style-hover="color:#ffffff; filter:drop-shadow(0 0 6px rgba(255,255,255,.8));"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round"><rect x="3" y="3" width="7" height="7" rx="1"></rect><rect x="14" y="3" width="7" height="7" rx="1"></rect><rect x="3" y="14" width="7" height="7" rx="1"></rect><rect x="14" y="14" width="7" height="7" rx="1"></rect></svg></button>
    <button onClick="{{ goReporte }}" title="Reporte" style="flex:none; width:34px; height:34px; display:flex; align-items:center; justify-content:center; border:none; background:transparent; color:#f0d27a; cursor:pointer; padding:0;" style-hover="color:#ffffff; filter:drop-shadow(0 0 6px rgba(255,255,255,.8));"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round" stroke-linecap="round"><path d="M9 2h6l4 4v14a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1V3a1 1 0 0 1 1-1z"></path><path d="M14 2v5h5"></path><path d="M8 13h8"></path><path d="M8 17h8"></path><path d="M8 9h3"></path></svg></button>
    <button onClick="{{ goPrecios }}" title="Precios" style="flex:none; width:34px; height:34px; display:flex; align-items:center; justify-content:center; border:none; background:transparent; color:#f0d27a; cursor:pointer; padding:0;" style-hover="color:#ffffff; filter:drop-shadow(0 0 6px rgba(255,255,255,.8));"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round" stroke-linecap="round"><path d="M12 1v22"></path><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg></button>
    <button onClick="{{ showPlansView }}" ref="{{ navPlanoBarRef }}" title="Volver al plano abierto" style="display:none; flex:none; width:34px; height:34px; align-items:center; justify-content:center; border:none; background:transparent; color:#f0d27a; cursor:pointer; padding:0; margin-left:2px;" style-hover="color:#ffffff; filter:drop-shadow(0 0 6px rgba(255,255,255,.85));"><svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round" stroke-linecap="round"><path d="M9 4L3 6.5v13.5l6-2.5 6 2.5 6-2.5V3l-6 2.5z"></path><path d="M9 4v13.5"></path><path d="M15 6.5V20"></path></svg></button>
  </div>
  <sc-if value="{{ viewItems }}" hint-placeholder-val="{{ false }}">
    <div style="position:fixed; left:0; right:0; top:54px; bottom:0; background:linear-gradient(160deg,#aeb4bb 0%,#82888f 45%,#5a5f65 100%); z-index:40; display:flex; flex-direction:column; font-family:'Tungsten','Oswald',ui-sans-serif,system-ui,sans-serif; animation:objSlideIn .26s cubic-bezier(.22,.61,.36,1);">
      <div style="flex:none; height:46px; box-sizing:border-box; display:flex; align-items:center; gap:12px; padding:0 18px; border-bottom:1px solid #d8cfbe; background:linear-gradient(180deg,#ffffff 0%,#f2f4f6 45%,#dfe3e7 100%); box-shadow:0 1px 4px rgba(0,0,0,.18);">
        <span style="font-size:13px; font-weight:800; color:#7a2129; letter-spacing:.12em;">ITEMS</span>
        <div style="flex:1;"></div>
        <div ref="{{ objBuildsBarRef }}" style="display:flex; flex:none;"></div>
      </div>
      <div style="flex:1; display:flex; flex-direction:column; min-height:0;">
        <div style="flex:none; padding:14px 22px 0;">
          <div ref="{{ objSetsPanelRef }}" style="display:none; align-items:center; gap:10px; margin-top:0; margin-bottom:12px;"></div>
        </div>
        <div style="flex:1; min-height:0; padding:14px 18px 18px; display:flex;">
          <div style="flex:1; min-height:0; display:flex; flex-direction:column; background:#f4f5f6; border:1px solid #d3d8de; border-radius:8px; overflow:hidden; box-shadow:0 2px 10px rgba(0,0,0,.22);">
            <div ref="{{ objSortBarRef }}" style="flex:none; display:flex; align-items:center; gap:8px; padding:10px 12px; border-bottom:1px solid #d8cfbe; background:linear-gradient(180deg,#ffffff,#e9ecef);"></div>
            <div ref="{{ objListRef }}" style="flex:1; min-height:0; overflow:auto; padding:10px;"></div>
          </div>
        </div>
      </div>
      <sc-if value="{{ addObjOpen }}" hint-placeholder-val="{{ false }}">
        <div onClick="{{ cancelAddObj }}" style="position:fixed; inset:0; z-index:80; display:flex; align-items:center; justify-content:center; background:rgba(0,0,0,.58);">
          <div onClick="{{ stopProp }}" style="width:440px; max-width:92vw; background:linear-gradient(160deg,#0e2a30,#08191d); border:1px solid rgba(22,200,208,.5); border-radius:12px; box-shadow:0 18px 50px rgba(0,0,0,.6), 0 0 26px -6px rgba(22,200,208,.5); padding:22px;">
            <div style="display:flex; align-items:center; gap:10px; margin-bottom:18px;">
              <span style="font-size:17px; font-weight:800; color:#fff; letter-spacing:.06em;">NUEVO OBJETO</span>
              <div style="flex:1;"></div>
              <button onClick="{{ cancelAddObj }}" style="flex:none; width:30px; height:30px; border:none; background:rgba(255,255,255,.07); color:rgba(255,255,255,.7); border-radius:6px; cursor:pointer; font-size:15px;">✕</button>
            </div>
            <div style="margin-bottom:14px;">
              <div style="font-size:10px; font-weight:800; letter-spacing:.06em; text-transform:uppercase; color:rgba(22,200,208,.85); margin-bottom:6px;">Nombre</div>
              <input ref="{{ objNameRef }}" type="text" placeholder="Nombre del objeto…" style="width:100%; height:38px; padding:0 12px; box-sizing:border-box; background:rgba(255,255,255,.06); border:1px solid rgba(22,200,208,.3); border-radius:7px; color:#fff; font-size:14px; outline:none;" />
            </div>
            <div style="font-size:10px; font-weight:800; letter-spacing:.06em; text-transform:uppercase; color:rgba(22,200,208,.85); margin-bottom:6px;">Descripción</div>
            <textarea ref="{{ objDescRef }}" placeholder="Descripción del objeto…" style="width:100%; height:88px; padding:10px 12px; box-sizing:border-box; background:rgba(255,255,255,.06); border:1px solid rgba(22,200,208,.3); border-radius:7px; color:#fff; font-size:14px; outline:none; resize:vertical; font-family:inherit; line-height:1.4; margin-bottom:20px;"></textarea>
            <div style="display:flex; gap:10px;">
              <button onClick="{{ cancelAddObj }}" style="flex:1; height:42px; border:1px solid rgba(255,255,255,.18); background:rgba(255,255,255,.05); color:rgba(255,255,255,.75); border-radius:8px; font-size:13px; font-weight:700; cursor:pointer; letter-spacing:.03em;">Cancelar</button>
              <button onClick="{{ saveObj }}" style="flex:1; height:42px; border:1px solid rgba(22,200,208,.8); background:linear-gradient(160deg,#16c8d0,#0a8a91); color:#04222a; border-radius:8px; font-size:13px; font-weight:800; cursor:pointer; letter-spacing:.04em; box-shadow:0 0 16px rgba(22,200,208,.4);">CREAR OBJETO</button>
            </div>
          </div>
        </div>
      </sc-if>
    </div>
  </sc-if>
  <sc-if value="{{ viewReport }}" hint-placeholder-val="{{ false }}">
    <div style="position:fixed; left:0; right:0; top:54px; bottom:0; background:#eef4f0; z-index:40; display:flex; flex-direction:column;">
      <div style="flex:none; height:54px; box-sizing:border-box; display:flex; align-items:center; gap:12px; padding:0 22px; border-bottom:1px solid #cbdcd1; background:#fff;">
        <span style="font-size:15px; font-weight:800; color:#1d4730; letter-spacing:.03em;">REPORTE</span>
        <span ref="{{ reportSubRef }}" style="font-size:12px; color:#6b8a76;"></span>
        <div style="flex:1;"></div>
        <button onClick="{{ printReport }}" style="height:34px; padding:0 15px; border:1px solid #2f8f4e; background:#fff; color:#1d6e3c; border-radius:7px; font-size:12.5px; font-weight:700; letter-spacing:.04em; cursor:pointer;" style-hover="background:#eef7f1;">IMPRIMIR</button>
      </div>
      <div ref="{{ reportBodyRef }}" style="flex:1; overflow:auto; padding:22px 26px;"></div>
    </div>
  </sc-if>


  <div style="flex:none; position:relative; display:flex; align-items:center; gap:12px; padding:10px 16px; background:linear-gradient(100deg, #3a0a10 0%, #6a1018 55%, #94161f 100%); border-bottom:1px solid rgba(22,200,208,.3); color:#e8e8e8;">
    <button onClick="{{ showTakeoffTab }}" ref="{{ tabTakeoffRef }}" style="display:none;"></button>
    <button onClick="{{ showTradesTab }}" ref="{{ tabTradesRef }}" style="display:none;"></button>
    <button onClick="{{ goProject }}" title="Retroceder" style="flex:none; width:34px; height:34px; display:flex; align-items:center; justify-content:center; border:1px solid rgba(22,200,208,.4); background:linear-gradient(160deg, #5e1216, #3a0a0d); color:#f0d2d4; border-radius:8px; cursor:pointer; padding:0;" style-hover="filter:brightness(1.14);"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M9 14 4 9l5-5"/><path d="M4 9h11a5 5 0 0 1 5 5v0a5 5 0 0 1-5 5H8"/></svg></button>
    <div style="position:relative; display:flex; align-items:center;">
      <button onClick="{{ toggleEditMenu }}" ref="{{ editBtnRef }}" title="Herramientas de edición" style="display:flex; align-items:center; justify-content:center; width:34px; height:34px; padding:0; border:1px solid rgba(22,200,208,.4); background:linear-gradient(160deg, #5e1216, #3a0a0d); color:#f0d2d4; border-radius:8px; cursor:pointer;" style-hover="filter:brightness(1.14);">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
        <span ref="{{ editToolLabelRef }}" style="display:none;"></span>
      </button>
      <sc-if value="{{ editMenuOpen }}" hint-placeholder-val="{{ false }}">
        <div ref="{{ editMenuRef }}" style="position:absolute; top:42px; left:0; width:236px; background:#fff; border:1px solid #cdc3b0; border-radius:4px; box-shadow:0 10px 26px rgba(60,40,20,.22); padding:5px; z-index:60; animation:ddSlide .2s ease both; transform-origin:top center; display:flex; flex-direction:column; gap:2px;"></div>
      </sc-if>
    </div>
    <button onClick="{{ toggleLock }}" ref="{{ lockBtnRef }}" title="Inmovilizar medidas" style="flex:none; width:34px; height:34px; display:flex; align-items:center; justify-content:center; border:1px solid rgba(22,200,208,.4); background:linear-gradient(160deg, #5e1216, #3a0a0d); color:#f0d2d4; border-radius:8px; cursor:pointer; padding:0;" style-hover="filter:brightness(1.14);"><svg ref="{{ lockIconRef }}" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg></button>
    <button onClick="{{ toggleDim3d }}" ref="{{ dimBtnRef }}" title="Vista dimensión 2D / 3D" style="flex:none; width:34px; height:34px; display:flex; align-items:center; justify-content:center; border:1px solid rgba(22,200,208,.4); background:linear-gradient(160deg, #5e1216, #3a0a0d); color:#f0d2d4; border-radius:8px; cursor:pointer; padding:0;" style-hover="filter:brightness(1.14);"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 3 7v10l9 5 9-5V7z"></path><path d="M3 7l9 5 9-5M12 12v10"></path></svg></button>
    <button onClick="{{ selectAllMeasurable }}" ref="{{ selAllBtnRef }}" title="Seleccionar todo lo medible de este plano" style="flex:none; width:34px; height:34px; display:flex; align-items:center; justify-content:center; border:1px solid rgba(22,200,208,.4); background:linear-gradient(160deg, #5e1216, #3a0a0d); color:#f0d2d4; border-radius:8px; cursor:pointer; padding:0;" style-hover="filter:brightness(1.14);"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8V5a2 2 0 0 1 2-2h3"/><path d="M16 3h3a2 2 0 0 1 2 2v3"/><path d="M21 16v3a2 2 0 0 1-2 2h-3"/><path d="M8 21H5a2 2 0 0 1-2-2v-3"/><path d="m8 12 3 3 5-6"/></svg></button>
    <button onClick="{{ autoCota }}" title="Crear cotas automáticas en las medidas seleccionadas" style="flex:none; width:34px; height:34px; display:flex; align-items:center; justify-content:center; border:1px solid rgba(22,200,208,.4); background:linear-gradient(160deg, #5e1216, #3a0a0d); color:#f0d2d4; border-radius:8px; cursor:pointer; padding:0;" style-hover="filter:brightness(1.14);"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8v8M14 8v8M3 12h11"/><path d="M6 9.5 3.5 12l2.5 2.5M11 9.5 13.5 12 11 14.5"/><path d="M19 5v6M16 8h6"/></svg></button>
    <button title="Captura para RFI (no disponible aún)" style="flex:none; position:relative; width:34px; height:34px; display:flex; align-items:center; justify-content:center; border:1px solid rgba(255,90,90,.5); background:linear-gradient(160deg, #3a0a0d, #240608); color:#8a7d7e; border-radius:8px; cursor:not-allowed; padding:0; opacity:.85;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 4h-5L8 6H4a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-4z"/><circle cx="12" cy="13" r="3.2"/></svg><svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="#ff4d4d" stroke-width="2.4" stroke-linecap="round" style="position:absolute; inset:0; filter:drop-shadow(0 0 2px rgba(0,0,0,.6));"><path d="M5 5 L19 19"/></svg></button>
    <button onClick="{{ toggleInvert }}" ref="{{ invertBtnRef }}" title="Invertir colores del plano" style="flex:none; width:34px; height:34px; display:flex; align-items:center; justify-content:center; border:1px solid rgba(22,200,208,.4); background:linear-gradient(160deg, #5e1216, #3a0a0d); color:#f0d2d4; border-radius:8px; cursor:pointer; padding:0;" style-hover="filter:brightness(1.14);"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 3a9 9 0 0 0 0 18z" fill="currentColor" stroke="none"/></svg></button>
    <span ref="{{ statusRef }}" style="font-size:12px; color:#9a9a9a; font-family:ui-monospace,monospace;"></span>
    <div style="flex:1;"></div>
    <sc-if value="{{ measureMode }}" hint-placeholder-val="{{ false }}">
      <div style="display:flex; gap:5px; align-items:center; margin-right:10px;">
        <button onClick="{{ toggleOrtho }}" ref="{{ orthoBtnRef }}" title="Líneas rectas (horizontal / vertical) — atajo: Shift" style="width:32px; height:32px; display:flex; align-items:center; justify-content:center; padding:0; border:1px solid rgba(255,255,255,.18); border-radius:8px; background:rgba(255,255,255,.06); color:#f0d2d4; cursor:pointer;">

  persistItemType(itemId, type) {

    let builds = [];

    let changed = false;
    builds.forEach((b) => {
      (b && Array.isArray(b.items) ? b.items : []).forEach((it) => { if (it && it.id === itemId && it.type !== type) { it.type = type; changed = true; } });

    this.persistItemType(it.id, type);          // el item queda fijo con el tipo elegido
    let height = it.height != null ? it.height : null;
    if (type === 'sa' && (!height || height <= 0)) {

      this.selectTakeoff(existing.id, false);

        if (this.state.addMenuOpen) { this.animateCloseMenu('addMenuRef', 'addMenuOpen'); return; }
        this.setState({ addMenuOpen: true, filterMenuOpen: false, editMenuOpen: false, scaleMenuOpen: false, itemMenuOpen: false });
      },
      pickTypeLF: () => this.openAddWith('lf'),
      pickTypeSF: () => this.openAddWith('sf'),
      pickTypeSA: () => this.openAddWith('sa'),
      openAdd: () => this.openAddWith(this.newType || 'lf'),
      cancelAdd: () => this.setState({ addOpen: false }),
      createTakeoff: () => this.goToStyle(),
      cancelStyle: () => { this.draft = null; this.setState({ styleOpen: false }); },
      backToName: () => this.setState({ styleOpen: false, addOpen: true }, () => {
        this.applyTablaPos(this.addPanelRef.current);
        if (this.toNameRef.current && this.draft) this.toNameRef.current.value = this.draft.name;
        this.renderAddShapes();
        if (this.addHeightRef.current) this.addHeightRef.current.value = (this.draft && this.draft.height != null) ? this.draft.height : '0';
      }),
      confirmCreate: () => this.createTakeoffItem(),
      setTypeLF: () => this.setNewType('lf'),
      setTypeSF: () => this.setNewType('sf'),
      onListBg: (e) => { if (e.target === this.toListRef.current) this.clearMarks(); },
      goHome: () => { const u = new URL(location.href); u.pathname = u.pathname.replace(/[^/]+$/, 'HOME.dc.html'); u.search = ''; location.href = u.toString(); },
      toggleSound: () => this.toggleSound(),
      toggleFullscreen: () => {
        try {
          const d = document, el = d.documentElement;
          const fsEl = d.fullscreenElement || d.webkitFullscreenElement;
          if (fsEl) { (d.exitFullscreen || d.webkitExitFullscreen).call(d); }
          else { const req = el.requestFullscreen || el.webkitRequestFullscreen; if (req) { const p = req.call(el); if (p && p.catch) p.catch(() => {}); } }
        } catch (e) {}
      },
      goProject: () => { if (this.pid) this.navTo('Visor proyecto (No tocar).dc.html', { id: this.pid }); },
      logout: () => { if (!window.confirm('¿Cerrar sesión?')) return; try { window.localStorage.removeItem('evm_auth'); } catch (e) {} const u = new URL(location.href); u.pathname = u.pathname.replace(/[^/]+$/, 'EVM.dc.html'); u.search = ''; location.href = u.toString(); },
      goBuilds: () => this.navTo('HOME.dc.html', { builds: '1' }),
      goReporte: () => { if (this.pid) this.navTo('Reporte.dc.html', { id: this.pid }); else this.navTo('Reporte.dc.html'); },
      goPrecios: () => { if (this.pid) this.navTo('Precios.dc.html', { id: this.pid }); else this.navTo('Precios.dc.html'); },
      noop: () => {},
      readoutRef: this.readoutRef,
      orthoBtnRef: this.orthoBtnRef, curveBtnRef: this.curveBtnRef, snapBtnRef: this.snapBtnRef, snapMeasBtnRef: this.snapMeasBtnRef,
      toggleOrtho: () => { this.orthoLock = !this.orthoLock; this.updateDrawToolBtns(); },
      toggleCurve: () => { this.curveMode = !this.curveMode; if (!this.curveMode) this.bowing = null; this.updateDrawToolBtns(); this.drawOverlay(); this.updateReadout(); if (this.statusRef.current) this.statusRef.current.textContent = this.curveMode ? 'Curva ON · coloca el punto y mueve el mouse para curvar · clic para fijar' : ''; },
      toggleSnap: () => { this.snapBlack = !this.snapBlack; if (this.snapBlack) this.buildInkMask(); this.updateDrawToolBtns(); },
      toggleSnapMeas: () => { this.snapMeas = !this.snapMeas; this.updateDrawToolBtns(); },
      measureBtnRef: this.measureBtnRef, calibBtnRef: this.calibBtnRef,
      calibInputRef: this.calibInputRef, calibInchRef: this.calibInchRef, calibMsgRef: this.calibMsgRef,
      calibStateRef: this.calibStateRef, calibBannerRef: this.calibBannerRef, calibWarnRef: this.calibWarnRef,
      openCalibFromBanner: () => { this.setState({ scaleMenuOpen: true }, () => { this.renderScaleMenu(); this.runCalib(); }); },
      toolLabelRef: this.toolLabelRef, toolHintRef: this.toolHintRef,
      loupeRef: this.loupeRef, loupeWrapRef: this.loupeWrapRef,
      liveBoxRef: this.liveBoxRef, liveSegRef: this.liveSegRef, liveTotalRef: this.liveTotalRef, liveTotalLabelRef: this.liveTotalLabelRef,
      liveDimsRef: this.liveDimsRef, liveMaxRef: this.liveMaxRef, liveMinRef: this.liveMinRef,

      zoomIn: () => { this.zoom = Math.min(5 / this.baseScale, this.zoom * 1.25); this.applyDisplaySize(); },
      zoomOut: () => { this.zoom = Math.max(0.2, this.zoom / 1.25); this.applyDisplaySize(); },
      fit: () => { this.zoom = 1; this.applyDisplaySize(); },

      toggleMenu: () => { this.setState((s) => ({ menuOpen: !s.menuOpen })); },
      pickLF: () => { this.activateTool('lf'); },
      pickSF: () => { this.activateTool('sf'); },
      stopMeasure: () => {
        this.setState({ menuOpen: false, measureMode: false, tool: null }, () => {
          this.setMeasureMode(false); this.hideLoupe();
        });
      },
      onScaleClick: () => {},
      clearMeasure: () => {
        const act = this.getActive();
        if (act) {
          act.segments = act.segments.filter((s) => s.plan !== this.planId);
          act.polys = act.polys.filter((p) => p.plan !== this.planId);
          this.persistTakeoffs(); this.renderTakeoffs();
        } else { this._scratchSeg.length = 0; this._scratchPoly.length = 0; }
        this.pending = null; this.mouse = null; this.polyPending = null;
        this.drawOverlay(); this.updateReadout();
      },

      startCalib: () => this.runCalib(),
      lockBtnRef: this.lockBtnRef, lockIconRef: this.lockIconRef,
      dimBtnRef: this.dimBtnRef, threeWrapRef: this.threeWrapRef, threeSceneRef: this.threeSceneRef,
      threeFloorRef: this.threeFloorRef, threeImgRef: this.threeImgRef, threeOvRef: this.threeOvRef,
      groundRef: this.groundRef,
      three3dHintRef: this.three3dHintRef, navRef: this.navRef, navHintRef: this.navHintRef, areaBtnRef: this.areaBtnRef, splitterRef: this.splitterRef,
      saved3dRef: this.saved3dRef,
      tabs3dRef: this.tabs3dRef,
      areaBtnRef: this.areaBtnRef, save3dBtnRef: this.save3dBtnRef, soundBtnRef: this.soundBtnRef, scale3dRef: this.scale3dRef,
      cota3dBtnRef: this.cota3dBtnRef, cotaLassoBtnRef: this.cotaLassoBtnRef,
      toggleCota3dMode: () => this.toggleCota3dMode(),
      toggleCotaLassoMode: () => this.toggleCotaLassoMode(),
      start3dMark: () => this.start3dMark(),
      save3dView: () => this.save3dView(),
      toggle3dList: () => this.toggle3dList(),
      toggleDim3d: () => this.toggleDim3d(),
      on3dDown: (e) => this.on3dDown(e),
      toggleNav3d: () => this.toggleNav3d(),
      on3dSplit: (e) => this.on3dSplit(e),
      invertBtnRef: this.invertBtnRef,
      toggleInvert: () => {
        this.planInvert = !this.planInvert;
        try { localStorage.setItem('vp_planInvert', this.planInvert ? '1' : '0'); } catch (e) {}
        this.applyInvert();
      },
      selectAllMeasurable: () => this.selectAllMeasurable(),
      autoCota: () => this.autoCota(),
      toggleLock: () => {
        this.locked = !this.locked;
        if (this.locked) {
          // freeze ONLY the measurements that exist right now on this plan;
          // anything drawn afterward (even into the same takeoff) stays editable
          this.frozenItems = new Set();
          for (const t of (this.takeoffs || [])) {
            for (const sg of (t.segments || [])) { if (!sg.plan || sg.plan === this.planId) this.frozenItems.add(sg); }
            for (const pl of (t.polys || [])) { if (!pl.plan || pl.plan === this.planId) this.frozenItems.add(pl); }
          }
          this.selected = null; this.selectedNode = null; this.multiSel = [];
        }
        else { this.frozenItems = null; }
        const btn = this.lockBtnRef.current, ic = this.lockIconRef.current;
        if (btn) {
          btn.title = this.locked ? 'Medidas inmovilizadas — pulsa para editar' : 'Inmovilizar medidas';
          btn.style.background = this.locked ? 'linear-gradient(160deg,#c9cdd3,#8b9097)' : 'linear-gradient(160deg, #5e1216, #3a0a0d)';
          btn.style.color = this.locked ? '#2a2e33' : '#f0d2d4';
          btn.style.borderColor = this.locked ? '#e9edf1' : 'rgba(22,200,208,.4)';
        }
        if (ic) {
          ic.innerHTML = this.locked
            ? '<rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/>'   // closed padlock
            : '<rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0"/>';     // open padlock
        }
        const o = this.overlayRef.current; if (o) o.style.cursor = this.NAV_CURSOR;
        this.renderTakeoffs(); this.drawOverlay();
      },
      applyCalib: () => this.doApplyCalib(),
      cancelCalib: () => {
        this.calibActive = false; this.calibSeg = null; this.calibComplete = false;
        this.setState({ calibPrompt: false });
        this.drawOverlay();
      },

      onDown: (e) => {
        if (e.button === 1) { this.startPan(e); return; }     // middle button always pans
        if (e.button === 2) { if (this.locked) { e.preventDefault(); return; } e.preventDefault(); e.stopPropagation(); this.startRubber(e); return; }   // right button = rubber-band multi-select
        if (e.button !== 0) return;
        e.stopPropagation();
        let p = this.pt(e);
        // marking the 3D floor rectangle takes over the click
        if (this._mark3d) {
          e.preventDefault();
          const start = p;
          this._rubber = { a: start, b: start };
          const mv = (ev) => { this._rubber.b = this.ptC(ev.clientX, ev.clientY); this.drawOverlay(); };
          const up = (ev) => { const r = this._rubber; this._rubber = null; this.drawOverlay(); this.finish3dMark(r.a, this.ptC(ev.clientX, ev.clientY)); window.removeEventListener('mousemove', mv); window.removeEventListener('mouseup', up); };
          window.addEventListener('mousemove', mv); window.addEventListener('mouseup', up);
          return;
        }
        if (this.state.measureMode && this.calibActive) {
          if (!this.calibSeg || this.calibComplete) {
            this.calibSeg = [p, p]; this.calibComplete = false;
          } else {
            p = this.ortho(this.calibSeg[0], p, e.shiftKey);
            this.calibSeg = [this.calibSeg[0], p]; this.calibComplete = true;
            if (this.state.scaleMenuOpen) this.renderScaleMenu();
          }
          this.drawOverlay(); this.updateLoupe(e.clientX, e.clientY);
          return;
        }
        // selection works any time (also when not measuring) so you can click a line and press Supr
        const drawing = this.state.tool === 'sf' ? !!this.polyPending : !!(this.lfPts && this.lfPts.length);
        // edit tools (multi-select / split) take over clicks when armed and not drawing
        if (!drawing && !this.locked && this.editTool !== 'select') {
          if (this.editTool === 'multi') {
            if (this.multiSel && this.multiSel.length && this.hitMulti(p)) { this.startMultiDrag(p); return; }   // hold on a marked item → move them all
            this.startRubber(e); return;
          }
          if (this.editTool === 'cota') {
            const sp = this.snapPtAlways(p);
            if (!this.cotaA) {
              const hi = this.cotaHit(sp);
              if (hi >= 0) { this.cotas.splice(hi, 1); this.persistCotas(); this.drawOverlay(); return; }   // click a cota to remove it
              this.cotaA = sp; this.mouse = sp; this.drawOverlay();
            } else {
              const b = this.ortho(this.cotaA, sp, e.shiftKey);
              if (Math.hypot((b.x - this.cotaA.x) * this.scale, (b.y - this.cotaA.y) * this.scale) > 4) {
                this.cotas.push({ plan: this.planId, a: { x: this.cotaA.x, y: this.cotaA.y }, b: { x: b.x, y: b.y } });
                this.persistCotas();
              }
              this.cotaA = null; this.mouse = null; this.drawOverlay();   // re-arm for the next dimension
            }
            return;
          }
          if (this.editTool === 'croprect') { this.startCropRect(e); return; }
          if (this.editTool === 'croppoly') {
            if (!this._cropPoly) this._cropPoly = [];
            this._cropPoly.push(p); this._cropMouse = p; this.drawOverlay();
            return;
          }
          if (this.editTool === 'split') {
            const hit = this.projectOnAny(p);
            if (!hit) { this.splitA = null; this.drawOverlay(); return; }
            if (!this.splitA) { this.splitA = hit; this.drawOverlay(); }
            else if (this.splitA.sel.item === hit.sel.item) { this.doSplit(this.splitA, hit); }
            else { this.splitA = hit; this.drawOverlay(); }
            return;
          }
        }
        if (!drawing) {
          // if an item is selected, a click on one of its square handles selects that single vertex
          if (this.selected) {
            const tolN = 12 / this.scale, ptsS = this.selected.item.pts;
            for (let i = 0; i < ptsS.length; i++) {
              if (Math.hypot(p.x - ptsS[i].x, p.y - ptsS[i].y) < tolN) { this.selectedNode = i; this.startNodeDrag(i); this.drawOverlay(); return; }
            }
            // press on the body of the already-selected item → insert a new node there (and drag it)
            const sh = this.segHit(this.selected, p);
            if (sh) {
              this.insertNodeAt(this.selected, sh.idx, sh.pt);
              this.selectedNode = sh.idx;
              this.renderTakeoffs(); this.startNodeDrag(sh.idx); this.drawOverlay();
              return;
            }
          }
          const hit = this.hitTest(p);
          if (hit && !(this.locked && this.isFrozenItem(hit.item))) {
            this.selected = hit; this.selectedNode = null; this.renderTakeoffs(); this.drawOverlay();
            // (clic en el plano ya NO abre el panel de edición — usar el kebab de la lista)
            this.startBodyDrag(hit, p);   // hold to move the whole measurement
            return;
          }
          // clicked empty space → unmark any selected/active takeoff (when not measuring)
          if (!this.state.measureMode && (this.selected || this.activeTo)) {
            this.selected = null; this.selectedNode = null; this.activeTo = null;
            try { localStorage.setItem(this.actoKey(), ''); } catch (e) {}
            this.renderTakeoffs(); this.drawOverlay();
          } else if (this.selected) { this.selected = null; this.selectedNode = null; this.renderTakeoffs(); this.drawOverlay(); }
        }
        if (!this.state.measureMode) { this.startPan(e); return; }   // not measuring + empty click → pan
        // require calibration before any measuring
        if (this.calibFtPerPt == null) {
          if (this.statusRef.current) this.statusRef.current.textContent = 'Este plano no tiene escala — calíbrala antes de medir.';
          if (!this.state.scaleMenuOpen) { this.setState({ scaleMenuOpen: true }, () => { try { this.renderScaleMenu(); } catch (e) {} }); }
          return;
        }
        // ignore the stray click left over right after finishing a measurement (double-click tail)
        if (this._suppressDownUntil && performance.now() < this._suppressDownUntil) { this._suppressDownUntil = 0; return; }
        p = this.snapPt(p);   // magnet: pull the placed point onto nearby black ink
        if (this.drawShape === 'rect' || this.drawShape === 'circle') {
          if (!this._shapeA) { this._shapeA = p; this.mouse = p; this.drawOverlay(); this.updateReadout(); this.updateLoupe(e.clientX, e.clientY); }
          else { const pts = this.buildShape(this._shapeA, p); this._shapeA = null; this.mouse = null; if (pts) this.commitShape(pts); this.updateLoupe(e.clientX, e.clientY); }
          return;
        }
        if (this.state.tool === 'sf') {
          if (!this.polyPending) { this.polyPending = [p]; this.mouse = p; }
          else {
            const first = this.polyPending[0];
            const dpx = Math.hypot((first.x - p.x) * this.scale, (first.y - p.y) * this.scale);
            if (this.polyPending.length >= 3 && dpx < 12) { this.finishPoly(); this.updateLoupe(e.clientX, e.clientY); return; }
            const anchor = this.polyPending[this.polyPending.length - 1];
            this.polyPending.push(this.ortho(anchor, p, e.shiftKey)); this.mouse = p;
          }
          this.drawOverlay(); this.updateReadout(); this.updateLoupe(e.clientX, e.clientY);
          return;
        }
        // LF polyline: each click adds a point; double-click / Enter finishes
        if (this.bowing) { this.bowing = null; this.drawOverlay(); this.updateReadout(); return; }   // a click locks the current arc
        if (!this.lfPts) { this.lfPts = []; this.lfBows = []; this.curveBow = 0; }
        const anchor = this.lfPts.length ? this.lfPts[this.lfPts.length - 1] : null;
        this.lfPts.push(anchor ? this.ortho(anchor, p, e.shiftKey) : p);
        if (anchor) { if (!this.lfBows) this.lfBows = []; this.lfBows.push(0); }
        this.mouse = p;
        // in curve mode, finishing a segment immediately enters live bowing: move the mouse to bend it, click to lock
        if (this.curveMode && this.lfPts.length >= 2) { this.bowing = { segIdx: this.lfPts.length - 2 }; this.mouse = null; }
        this.drawOverlay(); this.updateReadout(); this.updateLoupe(e.clientX, e.clientY);
      },
      onDblClick: () => {
        this._suppressDownUntil = performance.now() + 350;   // swallow the click that trails a double-click
        if (this.editTool === 'croppoly' && this._cropPoly && this._cropPoly.length >= 3) { const pts = this._cropPoly.slice(); this._cropPoly = null; this._cropMouse = null; this.applyCrop(pts); return; }
        if (this.state.tool === 'sf') this.finishPoly();
        else this.finishLF();
      },
      onCtxMenu: (e) => { e.preventDefault(); },
      onMove: (e) => {
        if (!this.state.measureMode) {
          if (this.editTool === 'cota' && this.cotaA) {
            const mp = this.snapPtAlways(this.pt(e));
            this.mouse = this.ortho(this.cotaA, mp, e.shiftKey);
            this.drawOverlay();
            return;
          }
          if (this.editTool === 'croppoly' && this._cropPoly && this._cropPoly.length) {
            this._cropMouse = this.pt(e); this.drawOverlay();
            return;
          }
          if (this.editTool !== 'select') { this.updateEditCursor(); return; }
          // not measuring: gold cursor when hovering a measurement or one is marked, else silver
          const o = this.overlayRef.current;
          if (o && !this.panning) {
            const over = this.selected || this.hitTest(this.pt(e));
            o.style.cursor = over ? this.GOLD_CURSOR : this.NAV_CURSOR;
          }
          return;
        }
        this._lastMouseClient = { x: e.clientX, y: e.clientY };
        // coalesce all the heavy per-move work (loupe + overlay redraw + readout) into
        // one animation frame so fast mouse movement can't queue up dozens of redraws
        this._pendMove = { cx: e.clientX, cy: e.clientY, shift: e.shiftKey };
        if (this._moveRAF) return;
        this._moveRAF = requestAnimationFrame(() => {
          this._moveRAF = null;
          const m = this._pendMove; if (!m) return;
          if (!this.state.measureMode) return;
          this.updateLoupe(m.cx, m.cy);
          const raw = this.ptC(m.cx, m.cy);
          const p = this.snapPt(raw);
          // remember the (possibly snapped) hover point so the magnet shows a marker
          // even before the FIRST point is placed
          const snappedOn = (this.snapBlack || this.snapMeas) && Math.hypot((p.x - raw.x) * this.scale, (p.y - raw.y) * this.scale) > 0.5;
          this._hoverSnap = { x: p.x, y: p.y, on: snappedOn };
          if (this.calibActive) {
            if (this.calibSeg && !this.calibComplete) { this.calibSeg = [this.calibSeg[0], this.ortho(this.calibSeg[0], p, m.shift)]; this.drawOverlay(); }
            return;
          }
          if ((this.drawShape === 'rect' || this.drawShape === 'circle') && this._shapeA) {
            this.mouse = p; this.drawOverlay(); this.updateReadout(); this.updateLiveBox(m.cx, m.cy);
            return;
          }
          if (this.state.tool === 'sf') {
            if (this.polyPending && this.polyPending.length) {
              const anchor = this.polyPending[this.polyPending.length - 1];
              this.mouse = this.ortho(anchor, p, m.shift);
            }
            this.drawOverlay(); this.updateReadout();
            return;
          }
          if (!this.lfPts || !this.lfPts.length) { this.drawOverlay(); return; }
          if (this.bowing) {
            const si = this.bowing.segIdx, A = this.lfPts[si], B = this.lfPts[si + 1];
            if (A && B) {
              const dx = B.x - A.x, dy = B.y - A.y, len = Math.hypot(dx, dy) || 1;
              const px = -dy / len, py = dx / len, mx = (A.x + B.x) / 2, my = (A.y + B.y) / 2;
              const perp = (p.x - mx) * px + (p.y - my) * py;        // signed offset of cursor from the chord
              let bow = Math.max(-5, Math.min(5, 2 * perp / len));
              if (!this.lfBows) this.lfBows = [];
              this.lfBows[si] = bow;
              this.drawOverlay(); this.updateReadout();
            }
            return;
          }
          const anchor = this.lfPts[this.lfPts.length - 1];
          this.mouse = this.ortho(anchor, p, m.shift);
          this.drawOverlay(); this.updateReadout();
        });
      },
      onLeave: () => { if (this._moveRAF) { cancelAnimationFrame(this._moveRAF); this._moveRAF = null; } this._hoverSnap = null; this.hideLoupe(); this.drawOverlay(); },

      onPanDown: (e) => {
        // for clicks on the gray padding (outside the canvas overlay)
        if (e.button === 1 || (e.button === 0 && !this.state.measureMode)) this.startPan(e);
      },
      onPanMove: () => {},
      onPanUp: () => {},
    };
  }
}
</script>
