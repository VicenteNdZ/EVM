<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<script src="supabase-sync.js"></script>
<script src="evm-ns.js"></script>
<script src="sfx.js"></script>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; height: 100%; background: #1a0f24; }  * { box-sizing: border-box; }
  ::placeholder { color: #6a6a6a; }
  input:focus { outline: none; }
  @keyframes deckSlideUp { from { transform: translateY(40px); opacity: .25; } to { transform: translateY(0); opacity: 1; } }
  @keyframes nodeGridDrift { from { background-position: 0 0, 0 0; } to { background-position: 34px 34px, 34px 34px; } }
  @keyframes wireFlow { to { stroke-dashoffset: -60; } }
  @keyframes nodeAura { 0% { transform: translate(-4%, -3%) scale(1); } 50% { transform: translate(5%, 4%) scale(1.12); } 100% { transform: translate(-3%, 5%) scale(1.05); } }
  @keyframes drillDockIn { from { transform: translateY(130px); opacity: 0; } to { transform: none; opacity: 1; } }
  @keyframes drillPop { from { transform: scale(.9); opacity: 0; } to { transform: none; opacity: 1; } }
  @keyframes drillNodeIn { from { transform: scale(.5); opacity: 0; } to { transform: none; opacity: 1; } }
  @keyframes drillOvIn { from { opacity: 0; transform: scale(1.04); } to { opacity: 1; transform: none; } }
  .bld-scroll { direction: rtl; }
  .bld-scroll > * { direction: ltr; }
  .bld-scroll::-webkit-scrollbar { width: 2px; }
  .bld-scroll::-webkit-scrollbar-track { background: transparent; }
  .bld-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,.35); border-radius: 0; }
  .bld-scroll { scrollbar-width: thin; scrollbar-color: rgba(255,255,255,.35) transparent; }
</style>
</helmet>
<div style="position:fixed; inset:0; display:flex; flex-direction:column; background:#000000; color:#e8e8e8; font-family:'Tungsten','Oswald',ui-sans-serif,system-ui,-apple-system,sans-serif;">

  <div style="flex:none; height:54px; box-sizing:border-box; display:flex; align-items:center; gap:12px; padding:0 28px; border-bottom:2px solid #c9d0d8; background:linear-gradient(100deg, #1a0608 0%, #3a0c12 45%, #5e1018 75%, #7a141c 100%); box-shadow:0 2px 18px rgba(201,208,216,.4);">
    <button onClick="{{ toggleSound }}" data-sound-btn="1" title="Sonido" style="flex:none; width:34px; height:34px; display:flex; align-items:center; justify-content:center; border:none; background:transparent; color:#f0d27a; cursor:pointer; padding:0;" style-hover="color:#ffe49a;"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5L6 9H2v6h4l5 4z"></path><path data-on="1" d="M15.5 8.5a5 5 0 0 1 0 7"></path><path data-on="1" d="M18.5 6a8 8 0 0 1 0 12"></path><path data-off="1" style="display:none" d="M22 9l-5 6M17 9l5 6"></path></svg></button>
    <button onClick="{{ toggleFullscreen }}" title="Pantalla completa" style="flex:none; width:34px; height:34px; display:flex; align-items:center; justify-content:center; border:none; background:transparent; color:#f0d27a; cursor:pointer; padding:0;" style-hover="color:#ffe49a;"><svg width="20" height="20" viewBox="0 0 16 16" fill="none"><path d="M2 6V2.5h3.5M14 6V2.5h-3.5M2 10v3.5h3.5M14 10v3.5h-3.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
    <button onClick="{{ logout }}" title="Cerrar sesión" style="flex:none; width:34px; height:34px; display:flex; align-items:center; justify-content:center; border:none; background:transparent; color:#f0d27a; cursor:pointer; padding:0;" style-hover="color:#ff9aa2;"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><path d="M16 17l5-5-5-5"></path><path d="M21 12H9"></path></svg></button>

    <div style="position:relative;">
      <button onClick="{{ toggleWsMenu }}" title="Cambiar espacio de trabajo" style="flex:none; display:flex; align-items:center; gap:8px; height:32px; padding:0 6px; border-radius:8px; cursor:pointer; font-family:inherit; border:none; background:transparent; color:#fff;" style-hover="color:#f0d27a;">
        <span ref="{{ wsIconRef }}" style="display:flex; align-items:center; color:#f0d27a;"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round" stroke-linecap="round"><circle cx="12" cy="8" r="3.2"></circle><path d="M6.5 20v-1.5a5.5 5.5 0 0 1 11 0V20"></path><circle cx="4.5" cy="9.5" r="2.2"></circle><path d="M1.5 19v-1a4 4 0 0 1 3.4-3.95"></path><circle cx="19.5" cy="9.5" r="2.2"></circle><path d="M22.5 19v-1a4 4 0 0 0-3.4-3.95"></path></svg></span>
      </button>
      <div ref="{{ wsMenuRef }}" style="display:none; position:absolute; top:38px; left:0; min-width:190px; background:#1c0a0e; border:1px solid rgba(201,208,216,.35); border-radius:10px; box-shadow:0 14px 40px rgba(0,0,0,.55); padding:6px; z-index:60;"></div>
    </div>
    <button onClick="{{ goProjectsTop }}" title="Projects" style="flex:none; width:34px; height:34px; display:flex; align-items:center; justify-content:center; border:none; background:transparent; color:#f0d27a; cursor:pointer; padding:0;" style-hover="color:#ffffff; filter:drop-shadow(0 0 6px rgba(255,255,255,.8));"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"><path d="M3 11l9-7 9 7"></path><path d="M5 9.5V20h14V9.5"></path><path d="M10 20v-5h4v5"></path></svg></button>
    <button onClick="{{ goUploadPlans }}" ref="{{ planoBtnRef }}" title="Planos" style="display:none;"></button>

    <div style="flex:1;"></div>
    <span style="flex:none; width:200px;"></span>
    <div style="width:1px; height:22px; background:rgba(240,210,122,.3); margin:0 2px;"></div>
    <button onClick="{{ openBuilds }}" title="Build" style="flex:none; width:34px; height:34px; display:flex; align-items:center; justify-content:center; border:none; background:transparent; color:#f0d27a; cursor:pointer; padding:0;" style-hover="color:#ffffff; filter:drop-shadow(0 0 6px rgba(255,255,255,.8));"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round"><rect x="3" y="3" width="7" height="7" rx="1"></rect><rect x="14" y="3" width="7" height="7" rx="1"></rect><rect x="3" y="14" width="7" height="7" rx="1"></rect><rect x="14" y="14" width="7" height="7" rx="1"></rect></svg></button>
  </div>


  <div style="flex:1; overflow:hidden; padding:16px 14px 22px; display:flex; flex-direction:column;">
    <div onClick="{{ onBgClick }}" style="max-width:none; margin:0; flex:1; min-height:0; display:flex; flex-direction:column;">

      <div style="display:flex; align-items:center; justify-content:flex-end; gap:24px; margin-bottom:14px; flex-wrap:wrap;">
        <div style="display:flex; align-items:center; gap:12px;">
          <button onClick="{{ toggleCardEdit }}" title="Editar fotos de las tarjetas" style="height:34px; width:26px; border:none; background:transparent; cursor:pointer; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3.5px; padding:0; opacity:{{ cardEditOpacity }};" style-hover="opacity:1;">
            <span style="width:5px; height:5px; border-radius:50%; background:#fff; box-shadow:0 0 5px rgba(255,255,255,.5);"></span>
            <span style="width:5px; height:5px; border-radius:50%; background:#fff; box-shadow:0 0 5px rgba(255,255,255,.5);"></span>
            <span style="width:5px; height:5px; border-radius:50%; background:#fff; box-shadow:0 0 5px rgba(255,255,255,.5);"></span>
          </button>
          <div style="position:relative; display:flex; align-items:center;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#7a7a7a" stroke-width="2" style="position:absolute; left:12px; pointer-events:none;"><circle cx="11" cy="11" r="7"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            <input ref="{{ searchRef }}" onInput="{{ onSearch }}" type="text" placeholder="Buscar proyecto" style="width:200px; height:34px; padding:0 14px 0 36px; border:1px solid rgba(255,255,255,.22); background:rgba(255,255,255,.1); color:#fff; border-radius:9px; font-size:14px; backdrop-filter:blur(6px);" />
          </div>
          <button onClick="{{ openNew }}" style="height:34px; padding:0 14px; border:none; background:linear-gradient(160deg, #d8dce1, #9aa0a8); color:#1c1f24; border-radius:7px; font-size:14px; font-weight:700; letter-spacing:.06em; cursor:pointer; display:flex; align-items:center; gap:8px; box-shadow:0 0 14px rgba(230,182,62,.4);" style-hover="filter:brightness(1.06);">
            <span style="font-size:18px; line-height:1;">+</span> PROJECTS
          </button>
        </div>
      </div>

      <sc-if value="{{ isEmpty }}" hint-placeholder-val="{{ false }}">
        <p ref="{{ emptyMsgRef }}" style="margin:0; font-size:14px; color:#7a7a7a;">Aún no tienes proyectos. Crea el primero con “+ Nuevo proyecto”.</p>
      </sc-if>

      <div ref="{{ gridRef }}" style="display:flex; align-items:stretch; justify-content:center; gap:0; perspective:2600px; flex:1; min-height:0; padding:0 4px;">
        <sc-for list="{{ projects }}" as="proj" hint-placeholder-count="3">
          <div data-pid="{{ proj.id }}" onClick="{{ proj.open }}" style="position:relative; flex:1 1 0; min-width:0; max-width:760px; display:flex; flex-direction:column; border:1px solid rgba(255,255,255,.34); border-radius:16px; cursor:pointer; overflow:hidden; color:#fff; background:linear-gradient(155deg, rgba(255,255,255,.22) 0%, rgba(205,230,250,.12) 45%, rgba(110,165,220,.12) 100%); backdrop-filter:blur(17px) saturate(140%); -webkit-backdrop-filter:blur(17px) saturate(140%); box-shadow:0 24px 50px rgba(6,24,44,.5), inset 0 1px 0 rgba(255,255,255,.5), inset 0 0 30px rgba(255,255,255,.06); transform:rotateY(-10deg) rotateX(1.5deg); transform-style:preserve-3d; transition:transform .3s cubic-bezier(.2,.7,.2,1), box-shadow .3s, border-color .15s;" style-hover="transform:rotateY(0deg) rotateX(0deg) translateY(-7px); border-color:rgba(255,255,255,.72); box-shadow:0 34px 70px rgba(6,24,44,.6), inset 0 1px 0 rgba(255,255,255,.6);">
            <sc-if value="{{ proj.cover }}" hint-placeholder-val="{{ false }}">
              <div style="{{ proj.coverStyle }}"></div>
              <div style="{{ proj.coverOverlay }}"></div>
            </sc-if>
            <sc-if value="{{ proj.editMode }}" hint-placeholder-val="{{ false }}">
              <div style="position:absolute; inset:0; z-index:7; display:flex; flex-direction:column; border:2px dashed rgba(255,255,255,.6); border-radius:16px; background:rgba(4,14,26,.5); backdrop-filter:blur(2px);">
                <button onClick="{{ proj.removePw }}" title="Eliminar proyecto" style="position:absolute; top:10px; right:10px; z-index:2; width:34px; height:34px; display:flex; align-items:center; justify-content:center; border:1px solid rgba(255,107,107,.5); border-radius:9px; background:rgba(40,8,10,.6); color:#ff8d8d; cursor:pointer;" style-hover="background:rgba(255,107,107,.25);">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18"></path><path d="M6 6l12 12"></path></svg>
                </button>
                <button onClick="{{ proj.editPhoto }}" title="Cambiar o añadir foto" style="flex:1; min-height:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; border:none; background:transparent; color:#fff; cursor:pointer; font-family:'IBM Plex Sans',sans-serif; font-size:15px; font-weight:700; letter-spacing:.02em;" style-hover="background:rgba(4,14,26,.32);">
                  <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><path d="M21 15l-5-5L5 21"></path></svg>
                  <span>{{ proj.coverActionLabel }}</span>
                </button>
                <div style="flex:none; padding:12px;">
                  <input defaultValue="{{ proj.name }}" onClick="{{ proj.stop }}" onBlur="{{ proj.renameProj }}" onKeyDown="{{ proj.renameKey }}" placeholder="Nombre del proyecto" style="width:100%; box-sizing:border-box; font-size:15px; font-weight:600; color:#fff; background:rgba(0,0,0,.42); border:1px solid rgba(255,255,255,.4); border-radius:8px; padding:9px 11px; outline:none; font-family:'IBM Plex Sans',sans-serif;" />
                </div>
              </div>
            </sc-if>
            <div style="position:absolute; top:0; left:-30%; width:55%; height:100%; background:linear-gradient(105deg, transparent, rgba(255,255,255,.28), transparent); transform:skewX(-14deg); pointer-events:none;"></div>
            <div style="position:absolute; left:0; right:0; bottom:0; min-height:118px; z-index:3; display:flex; flex-direction:column; justify-content:center; gap:9px; padding:20px 22px; background:linear-gradient(180deg, #5e1016 0%, #3d0a0e 100%); border-top:1px solid rgba(255,255,255,.16); box-shadow:0 -10px 26px rgba(0,0,0,.35);">
              <div style="font-family:'IBM Plex Sans',sans-serif; font-size:20px; font-weight:600; letter-spacing:.015em; color:#f3e7cd; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; text-shadow:0 1px 4px rgba(0,0,0,.5);">{{ proj.name }}</div>
              <div style="display:flex; align-items:center; justify-content:space-between; font-family:'IBM Plex Sans',sans-serif; font-size:12.5px; font-weight:400; letter-spacing:.02em; color:rgba(243,231,205,.72);">
                <span>{{ proj.pagesLabel }}</span>
                <span>{{ proj.dateLabel }}</span>
              </div>
            </div>
          </div>
        </sc-for>
      </div>

    </div>
  </div>

  <sc-if value="{{ buildsOpen }}" hint-placeholder-val="{{ false }}">
    <div style="position:fixed; inset:0; background-color:#3a0a10; background-image:radial-gradient(circle at 50% 0%, rgba(190,60,70,.22), transparent 60%); z-index:90; display:flex; flex-direction:column; font-family:'Tungsten','Oswald',ui-sans-serif,system-ui,sans-serif;">
      <div style="flex:none; height:54px; box-sizing:border-box; display:flex; align-items:center; gap:12px; padding:0 28px; border-bottom:2px solid #c9d0d8; background:linear-gradient(100deg, #1a0608 0%, #3a0c12 45%, #5e1018 75%, #7a141c 100%); box-shadow:0 2px 18px rgba(201,208,216,.4);">
        <button onClick="{{ toggleSound }}" data-sound-btn="1" title="Sonido" style="flex:none; width:34px; height:34px; display:flex; align-items:center; justify-content:center; border:none; background:transparent; color:#f0d27a; cursor:pointer; padding:0;" style-hover="color:#ffe49a;"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5L6 9H2v6h4l5 4z"></path><path data-on="1" d="M15.5 8.5a5 5 0 0 1 0 7"></path><path data-on="1" d="M18.5 6a8 8 0 0 1 0 12"></path><path data-off="1" style="display:none" d="M22 9l-5 6M17 9l5 6"></path></svg></button>
    <button onClick="{{ toggleFullscreen }}" title="Pantalla completa" style="flex:none; width:34px; height:34px; display:flex; align-items:center; justify-content:center; border:none; background:transparent; color:#f0d27a; cursor:pointer; padding:0;" style-hover="color:#ffe49a;"><svg width="20" height="20" viewBox="0 0 16 16" fill="none"><path d="M2 6V2.5h3.5M14 6V2.5h-3.5M2 10v3.5h3.5M14 10v3.5h-3.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
        <button onClick="{{ logout }}" title="Cerrar sesión" style="flex:none; width:34px; height:34px; display:flex; align-items:center; justify-content:center; border:none; background:transparent; color:#f0d27a; cursor:pointer; padding:0;" style-hover="color:#ff9aa2;"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><path d="M16 17l5-5-5-5"></path><path d="M21 12H9"></path></svg></button>
        <div style="position:relative; display:flex; align-items:center;">
          <button onClick="{{ toggleWsMenu2 }}" title="Cambiar espacio de trabajo" style="flex:none; width:34px; height:34px; display:flex; align-items:center; justify-content:center; border:none; background:transparent; color:#f0d27a; cursor:pointer; padding:0;" style-hover="color:#ffffff; filter:drop-shadow(0 0 6px rgba(255,255,255,.8));"><span ref="{{ wsIcon2Ref }}" style="display:flex; align-items:center;"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"><circle cx="12" cy="8" r="4"></circle><path d="M4 21c0-4 4-6 8-6s8 2 8 6"></path></svg></span></button>
          <div ref="{{ wsMenu2Ref }}" style="display:none; position:absolute; top:40px; left:0; min-width:190px; background:#1c0a0e; border:1px solid rgba(201,208,216,.35); border-radius:10px; box-shadow:0 14px 40px rgba(0,0,0,.55); padding:6px; z-index:95;"></div>
        </div>
        <button onClick="{{ goProjectsTop }}" title="Projects" style="flex:none; width:34px; height:34px; display:flex; align-items:center; justify-content:center; border:none; background:transparent; color:#f0d27a; cursor:pointer; padding:0;" style-hover="color:#ffffff; filter:drop-shadow(0 0 6px rgba(255,255,255,.8));"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"><path d="M3 11l9-7 9 7"></path><path d="M5 9.5V20h14V9.5"></path><path d="M10 20v-5h4v5"></path></svg></button>
        <button onClick="{{ goUploadPlans }}" ref="{{ planoBtnRef2 }}" title="Planos" style="display:none;"></button>
        <div style="flex:1;"></div>
        <span ref="{{ projRightRef }}" style="flex:none; max-width:240px; font-family:Arial,sans-serif; font-weight:700; font-size:18px; letter-spacing:.01em; color:#ffffff; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; text-align:right;"></span>
        <div style="width:1px; height:22px; background:rgba(240,210,122,.3); margin:0 2px;"></div>
        <button title="Build" style="flex:none; width:34px; height:34px; display:flex; align-items:center; justify-content:center; border:none; background:transparent; color:#ffffff; cursor:default; padding:0; filter:drop-shadow(0 0 7px rgba(255,255,255,.85));"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round"><rect x="3" y="3" width="7" height="7" rx="1"></rect><rect x="14" y="3" width="7" height="7" rx="1"></rect><rect x="3" y="14" width="7" height="7" rx="1"></rect><rect x="14" y="14" width="7" height="7" rx="1"></rect></svg></button>
        <button onClick="{{ goReporte }}" title="Reporte" style="flex:none; width:34px; height:34px; display:flex; align-items:center; justify-content:center; border:none; background:transparent; color:#f0d27a; cursor:pointer; padding:0; margin-left:2px;" style-hover="color:#ffffff; filter:drop-shadow(0 0 6px rgba(255,255,255,.85));"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round" stroke-linecap="round"><path d="M9 2h6l4 4v14a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1V3a1 1 0 0 1 1-1z"></path><path d="M14 2v5h5"></path><path d="M8 13h8"></path><path d="M8 17h8"></path><path d="M8 9h3"></path></svg></button>
        <button onClick="{{ goPrecios }}" title="Precios" style="flex:none; width:34px; height:34px; display:flex; align-items:center; justify-content:center; border:none; background:transparent; color:#f0d27a; cursor:pointer; padding:0; margin-left:2px;" style-hover="color:#ffffff; filter:drop-shadow(0 0 6px rgba(255,255,255,.85));"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round" stroke-linecap="round"><path d="M12 1v22"></path><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg></button>
        <button onClick="{{ goLastPlan }}" ref="{{ planoBackRef }}" title="Volver al plano abierto" style="display:none; flex:none; width:34px; height:34px; align-items:center; justify-content:center; border:none; background:transparent; color:#f0d27a; cursor:pointer; padding:0; margin-left:2px;" style-hover="color:#ffffff; filter:drop-shadow(0 0 6px rgba(255,255,255,.85));"><svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round" stroke-linecap="round"><path d="M9 4L3 6.5v13.5l6-2.5 6 2.5 6-2.5V3l-6 2.5z"></path><path d="M9 4v13.5"></path><path d="M15 6.5V20"></path></svg></button>
      </div>
      <div ref="{{ buildsBodyRef }}" style="flex:1; min-height:0; display:flex;"></div>
    </div>
  </sc-if>

  <sc-if value="{{ newOpen }}" hint-placeholder-val="{{ false }}">
    <div onClick="{{ closeNew }}" style="position:fixed; inset:0; background:rgba(0,0,0,.6); display:grid; place-items:center; z-index:80;">
      <div onClick="{{ stop }}" style="width:420px; max-width:92vw; background:linear-gradient(165deg, #5a1016, #3a0a0d); border:1px solid rgba(255,255,255,.16); border-radius:14px; padding:24px; box-shadow:0 18px 50px rgba(0,0,0,.6);">
        <label style="display:block; font-size:12px; color:#e0b9bc; margin-bottom:6px;">Nombre del proyecto</label>

    ov.appendChild(box);
    ov.onclick = (e) => { if (e.target === ov) ov.remove(); };
    document.body.appendChild(ov);
    setTimeout(() => sb.focus(), 30);
  }
  openCreateItemForm(b, onDone) {
    const old = document.getElementById('__itemFormModal'); if (old) old.remove();
    const ov = document.createElement('div'); ov.id = '__itemFormModal';
    ov.style.cssText = 'position:fixed; inset:0; z-index:320; display:flex; align-items:center; justify-content:center; background:rgba(4,10,14,.62); backdrop-filter:blur(3px);';
    const box = document.createElement('div');
    box.style.cssText = 'width:440px; max-width:92vw; background:#0e2a2e; border:1px solid rgba(201,208,216,.35); border-radius:16px; box-shadow:0 24px 70px rgba(0,0,0,.6); padding:24px;';
    const head = document.createElement('div'); head.style.cssText = 'display:flex; align-items:center; gap:11px; margin-bottom:18px;';
    const ic = document.createElement('span'); ic.textContent = 'I';
    ic.style.cssText = 'flex:none; width:34px; height:34px; display:flex; align-items:center; justify-content:center; border:1.8px solid rgba(255,255,255,.85); border-radius:7px; background:rgba(255,255,255,.08); color:#fff; font-family:"IBM Plex Sans",sans-serif; font-size:18px; font-weight:800;';
    const ht = document.createElement('div');
    ht.innerHTML = '<div style="font-family:\'IBM Plex Sans\',sans-serif; font-size:17px; font-weight:700; color:#fff;">Nuevo item</div><div style="font-family:\'IBM Plex Sans\',sans-serif; font-size:12px; color:rgba(255,255,255,.5);">se guarda en el catálogo</div>';
    head.appendChild(ic); head.appendChild(ht);
    const mkField = (label) => {
      const w = document.createElement('div'); w.style.cssText = 'margin-bottom:14px;';
      const l = document.createElement('div'); l.textContent = label; l.style.cssText = 'font-family:"IBM Plex Sans",sans-serif; font-size:11px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; color:rgba(255,255,255,.5); margin-bottom:6px;';
      w.appendChild(l); return w;
    };
    const nameW = mkField('Nombre');
    const nameInp = document.createElement('input'); nameInp.placeholder = 'Ej. Muro de fundación';
    nameInp.style.cssText = 'width:100%; box-sizing:border-box; background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.16); border-radius:9px; color:#fff; font-family:"IBM Plex Sans",sans-serif; font-size:14px; padding:11px 12px; outline:none;';
    nameInp.onfocus = () => nameInp.style.borderColor = '#c9d0d8';
    nameInp.onblur = () => nameInp.style.borderColor = 'rgba(255,255,255,.16)';
    nameW.appendChild(nameInp);
    const descW = mkField('Descripción');
    const descInp = document.createElement('textarea'); descInp.placeholder = 'Opcional'; descInp.rows = 3;
    descInp.style.cssText = 'width:100%; box-sizing:border-box; resize:vertical; background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.16); border-radius:9px; color:#fff; font-family:"IBM Plex Sans",sans-serif; font-size:14px; padding:11px 12px; outline:none;';
    descInp.onfocus = () => descInp.style.borderColor = '#c9d0d8';
    descInp.onblur = () => descInp.style.borderColor = 'rgba(255,255,255,.16)';
    descW.appendChild(descInp);
    // selector — browse gold blocks one at a time with arrows
    const buildW = mkField('Agregar a build');
    const sets = (b && b.sets) ? b.sets : [];
    const sel = new Set();
    const stepWrap = document.createElement('div');
    if (!sets.length) {
      const none = document.createElement('div'); none.textContent = 'Esta carta no tiene builds (bloques de oro) todavía.';
      none.style.cssText = 'font-family:"IBM Plex Sans",sans-serif; font-size:12.5px; color:rgba(255,255,255,.45);';
      stepWrap.appendChild(none);
    } else {
      let idx = 0;
      const row = document.createElement('div'); row.style.cssText = 'display:flex; align-items:center; gap:10px;';
      const arrow = (dir) => { const btn = document.createElement('button'); btn.type = 'button'; btn.innerHTML = dir < 0 ? '‹' : '›'; btn.style.cssText = 'flex:none; width:34px; height:44px; border:1px solid rgba(255,255,255,.16); border-radius:9px; background:rgba(255,255,255,.05); color:#fff; font-size:22px; line-height:1; cursor:pointer;'; return btn; };
      const prev = arrow(-1); const next = arrow(1);
      const card = document.createElement('button'); card.type = 'button'; card.style.cssText = 'flex:1; min-width:0; height:44px; display:flex; align-items:center; justify-content:space-between; gap:10px; padding:0 14px; border-radius:9px; cursor:pointer; font-family:"IBM Plex Sans",sans-serif;';
      const lbl = document.createElement('span'); lbl.style.cssText = 'min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-size:14px; font-weight:600;';
      const tick = document.createElement('span'); tick.style.cssText = 'flex:none; font-size:14px; font-weight:700;';
      card.appendChild(lbl); card.appendChild(tick);
      const counter = document.createElement('div'); counter.style.cssText = 'text-align:center; font-family:"IBM Plex Sans",sans-serif; font-size:11px; color:rgba(255,255,255,.4); margin-top:7px;';
      const paint = () => {
        const s = sets[idx]; const on = sel.has(s.id);
        lbl.textContent = (s.num ? s.num + ' · ' : '') + (s.name || 'Build');
        tick.textContent = on ? '✓ Agregado' : '+ Tocar para agregar';
        tick.style.color = on ? '#f4d98a' : 'rgba(255,255,255,.5)';
        card.style.border = on ? '1.5px solid #e7c66b' : '1px solid rgba(255,255,255,.16)';
        card.style.background = on ? 'rgba(231,198,107,.18)' : 'rgba(255,255,255,.05)';
        lbl.style.color = on ? '#f4d98a' : '#fff';
        counter.textContent = (idx + 1) + ' / ' + sets.length + (sel.size ? '  ·  ' + sel.size + ' seleccionado' + (sel.size > 1 ? 's' : '') : '');
        prev.style.opacity = sets.length > 1 ? '1' : '.35'; next.style.opacity = sets.length > 1 ? '1' : '.35';
      };
      card.onclick = () => { const s = sets[idx]; if (sel.has(s.id)) sel.delete(s.id); else sel.add(s.id); paint(); };
      prev.onclick = () => { idx = (idx - 1 + sets.length) % sets.length; paint(); };
      next.onclick = () => { idx = (idx + 1) % sets.length; paint(); };
      row.appendChild(prev); row.appendChild(card); row.appendChild(next);
      stepWrap.appendChild(row); stepWrap.appendChild(counter);
      paint();
    }
    buildW.appendChild(stepWrap);
    const foot = document.createElement('div'); foot.style.cssText = 'display:flex; justify-content:flex-end; gap:10px; margin-top:6px;';
    const cancel = document.createElement('button'); cancel.textContent = 'Cancelar';
    cancel.style.cssText = 'height:40px; padding:0 18px; border:1px solid rgba(255,255,255,.18); border-radius:9px; background:transparent; color:rgba(255,255,255,.7); font-family:"IBM Plex Sans",sans-serif; font-size:13.5px; font-weight:600; cursor:pointer;';
    cancel.onclick = () => ov.remove();
    const ok = document.createElement('button'); ok.textContent = 'Crear y agregar';
    ok.style.cssText = 'height:40px; padding:0 20px; border:none; border-radius:9px; background:linear-gradient(180deg,#d8dce1,#9aa0a8); color:#1c1f24; font-family:"IBM Plex Sans",sans-serif; font-size:13.5px; font-weight:700; cursor:pointer;';
    ok.onclick = () => {
      const name = nameInp.value.trim();
      if (!name) { nameInp.style.borderColor = '#ef4444'; nameInp.focus(); return; }
      this.loadCatalog();
      const ci = { id: 'cat' + Date.now().toString(36), name: name, desc: descInp.value.trim(), objects: [] };
      this.catalog.push(ci); this.persistCatalog();
      if (b) {
        if (!Array.isArray(b.items)) b.items = [];
        const setIds = sel.size ? [...sel] : [null];
        setIds.forEach((sid) => {
          b.items.push({ id: 'it' + Date.now().toString(36) + Math.random().toString(36).slice(2, 5), catId: ci.id, setId: sid, num: this.nextItemNum(b), name: ci.name, desc: ci.desc, objects: [] });
        });
        this.persistBuilds(); this.renderBuilds();
      }
      ov.remove(); if (onDone) onDone();
    };
    foot.appendChild(cancel); foot.appendChild(ok);
    box.appendChild(head); box.appendChild(nameW); box.appendChild(descW); box.appendChild(buildW); box.appendChild(foot);
    ov.appendChild(box);
    ov.onclick = (e) => { if (e.target === ov) ov.remove(); };
    document.body.appendChild(ov);
    nameInp.focus();
    nameInp.onkeydown = (e) => { if (e.key === 'Enter') ok.click(); };
  }
  openBuildMenu(b, anchor) {
    const old = document.getElementById('__buildMenu'); if (old) old.remove();
    const menu = document.createElement('div'); menu.id = '__buildMenu';
    const r = anchor.getBoundingClientRect();
    menu.style.cssText = 'position:fixed; top:' + (r.bottom + 6) + 'px; left:' + Math.max(12, r.right - 200) + 'px; width:200px; background:#1c0a0e; border:1px solid rgba(201,208,216,.35); border-radius:10px; box-shadow:0 14px 40px rgba(0,0,0,.6); padding:6px; z-index:200;';
    const mk = (label, sub, icon, onClick, danger) => {
      const btn = document.createElement('button');
      btn.style.cssText = 'width:100%; display:flex; align-items:center; gap:10px; padding:9px 10px; border:none; border-radius:7px; cursor:pointer; text-align:left; font-family:inherit; background:transparent; color:' + (danger ? '#ff8d8d' : '#fff') + ';';
      btn.onmouseenter = () => btn.style.background = 'rgba(255,255,255,.07)';
      btn.onmouseleave = () => btn.style.background = 'transparent';
      btn.innerHTML = '<span style="display:flex; color:' + (danger ? '#ff8d8d' : '#c9d0d8') + ';">' + icon + '</span><span style="display:flex; flex-direction:column; gap:1px;"><span style="font-size:13px; letter-spacing:.03em;">' + label + '</span>' + (sub ? '<span style="font-size:10.5px; color:rgba(255,255,255,.42);">' + sub + '</span>' : '') + '</span>';
      btn.onclick = (e) => { e.stopPropagation(); menu.remove(); onClick(); };
      menu.appendChild(btn);
    };
    const inUse = !!b.isDefault;
    mk('Renombrar', null, '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"></path><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"></path></svg>',
      () => { this.renamingBuild = b.id; this.renderBuilds(); });
    mk(inUse ? 'En uso' : 'Usar esta build', inUse ? 'Es la build activa' : 'Marcar como activa',
      '<svg width="16" height="16" viewBox="0 0 24 24" fill="' + (inUse ? '#ffc73a' : 'none') + '" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2.5l2.9 5.9 6.5.95-4.7 4.6 1.1 6.5L12 18.9l-5.8 3.05 1.1-6.5-4.7-4.6 6.5-.95z"></path></svg>',
      () => { this.builds.forEach((x) => x.isDefault = (x.id === b.id)); this.persistBuilds(); this.renderBuilds(); });
    if (this.builds.length < 3) {
      mk('Nueva build', 'Crear otra build', '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14"></path><path d="M5 12h14"></path></svg>',
        () => this.newBuild());
    }
    mk('Eliminar', null, '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M8 6V4h8v2"></path><path d="M19 6l-1 14H6L5 6"></path></svg>',
      () => this.deleteBuild(b.id), true);
    document.body.appendChild(menu);
    const close = (ev) => { if (!menu.contains(ev.target)) { menu.remove(); document.removeEventListener('mousedown', close); } };
    setTimeout(() => document.addEventListener('mousedown', close), 0);
  }
  navTo(file, params) {
    const u = new URL(location.href);
    u.pathname = u.pathname.replace(/[^/]+$/, file);
    if (params) Object.keys(params).forEach((k) => u.searchParams.set(k, params[k]));
    location.href = u.toString();
  }
  open(p) { try { this.setCalcProject(p.id); } catch (e) {} this.navTo('Visor proyecto (No tocar).dc.html', { id: p.id }); }

  renderVals() {
    const q = this.state.query.trim().toLowerCase();
    const filtered = this.state.all.filter((p) =>
      !q || p.name.toLowerCase().includes(q) || (p.location || '').toLowerCase().includes(q));
    const projects = filtered.map((p, i) => {
      const nm = (p.name || '').toLowerCase();
      const saved = (this.loadProjCovers() || {})[p.id];
      const coverSrc = saved || (p.id === 'seed_1345' || nm.includes('1345') ? 'uploads/render_1345.jpg' : (nm.includes('6675') ? 'uploads/7S303556.jpg' : ''));
      const editMode = !!this.state.cardEdit;
      return ({
      name: p.name,
      location: p.location || '',
      cover: coverSrc,
      coverStyle: coverSrc ? { position: 'absolute', left: 0, right: 0, top: 0, bottom: '118px', backgroundImage: "url('" + coverSrc + "')", backgroundSize: 'cover', backgroundPosition: 'center', pointerEvents: 'none' } : null,
      coverOverlay: coverSrc ? { position: 'absolute', left: 0, right: 0, top: 0, bottom: '118px', background: 'linear-gradient(180deg, rgba(8,28,50,.05) 0%, rgba(8,28,50,.1) 55%, rgba(6,22,44,.35) 100%)', pointerEvents: 'none' } : null,
      pagesLabel: (p.pages || 0) + (p.pages === 1 ? ' plano' : ' planos'),
      dateLabel: this.fmtDate(p.dateISO ? p.dateISO + 'T00:00:00' : p.createdAt),
      id: p.id,
      editMode: editMode,
      coverActionLabel: coverSrc ? 'Cambiar foto' : 'Añadir foto',
      stop: (e) => { if (e) e.stopPropagation(); },
      renameProj: (e) => {
        const name = (e.target.value || '').trim();
        if (!name || name === p.name) return;
        this.persist(this.state.all.map((x) => x.id === p.id ? { ...x, name } : x));
      },
      renameKey: (e) => { if (e.key === 'Enter') { e.preventDefault(); e.target.blur(); } },
      editPhoto: (e) => { if (e) e.stopPropagation(); this.pickProjCover(p.id, () => this.forceUpdate()); },
      removePw: (e) => { if (e) e.stopPropagation(); this.askKey('Eliminar “' + (p.name || 'proyecto') + '”', () => { this.persist(this.state.all.filter((x) => x.id !== p.id)); }); },
      open: editMode ? ((e) => { if (e) e.stopPropagation(); }) : (() => {
        if (this.state.expandedId === p.id) { this.open(p); }
        else { try { this.setCalcProject(p.id); } catch (e) {} this.setState({ expandedId: p.id }, () => this.refreshPlanoBtn()); }
      }),
      remove: (e) => {
        e.stopPropagation();
        this.persist(this.state.all.filter((x) => x.id !== p.id));
      },
    }); });
    return {
      projects,
      isEmpty: projects.length === 0,
      newOpen: this.state.newOpen,
      toggleCardEdit: () => this.setState({ cardEdit: !this.state.cardEdit }),
      cardEdit: !!this.state.cardEdit,
      cardEditOpacity: this.state.cardEdit ? '1' : '0.5',
      searchRef: this.searchRef, countRef: this.countRef, gridRef: this.gridRef,
      emptyMsgRef: this.emptyMsgRef, nameRef: this.nameRef, dateRef: this.dateRef, errRef: this.errRef,

      buildsOpen: this.state.buildsOpen,
      buildsBodyRef: this.buildsBodyRef,
      buildTitleRef: this.buildTitleRef,
      openBuilds: () => this.openBuildView(),
      goProjectsTop: () => this.setState({ buildsOpen: false }),
      toggleSound: () => this.toggleSound(),
      toggleFullscreen: () => { try { const d = document, el = d.documentElement; const fsEl = d.fullscreenElement || d.webkitFullscreenElement; if (fsEl) { (d.exitFullscreen || d.webkitExitFullscreen).call(d); } else { const req = el.requestFullscreen || el.webkitRequestFullscreen; if (req) { const p = req.call(el); if (p && p.catch) p.catch(() => {}); } } } catch (e) {} },
      newBuildTop: () => this.newBuild(),
      onBgClick: (e) => { if (this.state.expandedId && !e.target.closest('[data-pid]')) this.setState({ expandedId: null }); },
      planoBtnRef: this.planoBtnRef,
      planoBtnRef2: this.planoBtnRef2,
      planoBackRef: this.planoBackRef,
      projRightRef: this.projRightRef,
      objBtnRef: this.objBtnRef,
      objBtnRef2: this.objBtnRef2,
      goLastObjetos: () => { const ap = this.activePlan(); if (ap) this.navTo('Visor de Plano (No tocar).dc.html', ap.empty ? { project: ap.project, empty: '1', view: 'items' } : { project: ap.project, plan: ap.plan, view: 'items' }); },
      userNameRef: this.userNameRef,
      userInitialRef: this.userInitialRef,
      wsNameRef: this.wsNameRef,
      wsIconRef: this.wsIconRef,
      wsMenuRef: this.wsMenuRef,
      wsIcon2Ref: this.wsIcon2Ref,
      wsMenu2Ref: this.wsMenu2Ref,
      toggleWsMenu2: () => {
        const m = this.wsMenu2Ref.current; if (!m) return;
        const open = m.style.display !== 'none';
        if (open) { this.closeWsMenu(); return; }
        this.buildWsUI();
        m.style.display = 'block';
        this._wsDoc = (ev) => { if (!m.contains(ev.target) && !ev.target.closest('[title="Cambiar espacio de trabajo"]')) this.closeWsMenu(); };
        setTimeout(() => document.addEventListener('mousedown', this._wsDoc), 0);
      },
      toggleWsMenu: () => {
        const m = this.wsMenuRef.current; if (!m) return;
        const open = m.style.display !== 'none';
        if (open) { this.closeWsMenu(); return; }
        this.buildWsUI();
        m.style.display = 'block';
        this._wsDoc = (ev) => { if (!m.contains(ev.target) && !ev.target.closest('[title="Cambiar espacio de trabajo"]')) this.closeWsMenu(); };
        setTimeout(() => document.addEventListener('mousedown', this._wsDoc), 0);
      },
      logout: () => {
        if (!window.confirm('¿Cerrar sesión?')) return;
        try { window.localStorage.removeItem('evm_auth'); } catch (e) {}
        const u = new URL(location.href);
        u.pathname = u.pathname.replace(/[^/]+$/, 'EVM.dc.html');
        u.search = '';
        location.href = u.toString();
      },
      goLastPlan: () => { const ap = this.activePlan(); if (ap) this.navTo('Visor de Plano (No tocar).dc.html', ap.empty ? { project: ap.project, empty: '1' } : { project: ap.project, plan: ap.plan }); },
      goUploadPlans: () => { const ap = this.activePlan(); if (ap) this.navTo('Visor proyecto (No tocar).dc.html', { id: ap.project }); },
      goReporte: () => { const pid = this.calcProjectId(); this.navTo('Reporte.dc.html', pid ? { id: pid } : null); },
      goPrecios: () => { const pid = this.calcProjectId(); this.navTo('Precios.dc.html', pid ? { id: pid } : null); },
      closeBuilds: () => this.setState({ buildsOpen: false }),
      onSearch: (e) => {
        this.setState({ query: e.target.value }, () => {
          if (this.countRef.current) this.countRef.current.textContent = this.renderFilteredCount();
          if (this.emptyMsgRef.current && this.state.query.trim())
            this.emptyMsgRef.current.textContent = 'No se encontraron proyectos para “' + this.state.query.trim() + '”.';
        });
      },
      openNew: () => this.setState({ newOpen: true }, () => {
        this.nameRef.current?.focus();
        if (this.dateRef.current) this.dateRef.current.value = this.todayISO();
        if (this.errRef.current) this.errRef.current.textContent = '';
      }),
      closeNew: () => this.setState({ newOpen: false }),
      stop: (e) => e.stopPropagation(),
      createProject: () => {
        const name = (this.nameRef.current?.value || '').trim();
        const dateISO = (this.dateRef.current?.value || '').trim() || this.todayISO();
        if (!name) { if (this.errRef.current) this.errRef.current.textContent = 'Escribe un nombre para el proyecto.'; return; }
        const proj = { id: 'p' + Date.now().toString(36), name, dateISO, pages: 0, createdAt: Date.now() };
        this.persist([proj, ...this.state.all]);
        this.setState({ newOpen: false });
        this.open(proj);   // go straight to Upload plans
      },
    };
  }
  renderFilteredCount() {
    const q = this.state.query.trim().toLowerCase();
    return this.state.all.filter((p) => !q || p.name.toLowerCase().includes(q) || (p.location || '').toLowerCase().includes(q)).length;
  }
  componentDidUpdate() {
    this.applySoundBtn();
    if (this.countRef.current) this.countRef.current.textContent = this.renderFilteredCount();
    this.expandFirstCard();
  }
  expandFirstCard() {
    const g = this.gridRef && this.gridRef.current; if (!g) return;
    const kids = Array.from(g.children);
    const expId = this.state.expandedId;
    const n = kids.length;
    kids.forEach((c, i) => {
      c.style.gridColumn = ''; c.style.aspectRatio = '';
      c.style.marginLeft = (i === 0) ? '0' : '-64px';
      const isExp = expId && c.dataset.pid === expId;
      if (isExp) { c.style.flexGrow = '0'; c.style.flexShrink = '0'; c.style.flexBasis = '42%'; }
      else { c.style.flexGrow = '1'; c.style.flexShrink = '1'; c.style.flexBasis = '0'; }
      const baseZ = kids.length - i;
      c.dataset.baseZ = String(baseZ);
      c.style.zIndex = isExp ? '900' : String(baseZ);
      if (!c._hoverBound) {
        c._hoverBound = true;
        c.addEventListener('mouseenter', () => {
          // bring hovered card fully to the front from its own spot
          c.style.zIndex = '999';
          c.style.transform = 'rotateY(0deg) rotateX(0deg) translateY(-4px) scale(1.05)';
        });
        c.addEventListener('mouseleave', () => {
          c.style.zIndex = c.dataset.baseZ || '1';
          c.style.transform = 'rotateY(-10deg) rotateX(1.5deg)';
        });
        // press: snap to front from its place
        c.addEventListener('mousedown', () => { c.style.zIndex = '999'; });
      }
    });
  }
}
</script>
