<!DOCTYPE html>
<html style="background:#120407">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
<script src="./supabase-sync.js"></script>
</head>
<body style="background:#120407; margin:0">
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; height: 100%; background: #160508; -webkit-font-smoothing: antialiased; }
  * { box-sizing: border-box; }
  ::placeholder { color: #8a7f86; }
  input:focus { outline: none; }
  @keyframes evmFloat { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-7px); } }
  @keyframes evmGlow { 0%,100% { box-shadow: 0 0 26px rgba(22,200,208,.32), inset 0 1px 0 rgba(255,255,255,.10); } 50% { box-shadow: 0 0 40px rgba(22,200,208,.5), inset 0 1px 0 rgba(255,255,255,.16); } }
</style>
</helmet>
<div style="position:fixed; inset:0; display:flex; align-items:center; justify-content:center; background:radial-gradient(circle at 62% 22%, #45101a 0%, #2a0a10 52%, #120407 100%); color:#f1eef0; font-family:'Tungsten','Oswald',ui-sans-serif,system-ui,sans-serif; overflow:hidden;">

  <div style="position:absolute; top:-180px; right:-120px; width:520px; height:520px; border-radius:50%; background:radial-gradient(circle, rgba(122,20,28,.55) 0%, rgba(122,20,28,0) 70%); pointer-events:none;"></div>
  <div style="position:absolute; bottom:-200px; left:-140px; width:560px; height:560px; border-radius:50%; background:radial-gradient(circle, rgba(22,200,208,.18) 0%, rgba(22,200,208,0) 70%); pointer-events:none;"></div>

  <div style="position:absolute; top:26px; left:0; right:0; text-align:center; font-size:13px; letter-spacing:.4em; color:rgba(255,255,255,.4); text-transform:uppercase;">Estimating &amp; Value Measurement</div>
  <button onClick="{{ toggleFullscreen }}" title="Pantalla completa" style="position:absolute; top:18px; left:28px; width:34px; height:34px; display:flex; align-items:center; justify-content:center; border:none; background:transparent; color:#f0d27a; cursor:pointer; padding:0; z-index:5;" style-hover="color:#ffe49a;"><svg width="20" height="20" viewBox="0 0 16 16" fill="none"><path d="M2 6V2.5h3.5M14 6V2.5h-3.5M2 10v3.5h3.5M14 10v3.5h-3.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg></button>

  <div style="position:relative; width:380px; padding:42px 38px 34px; border-radius:18px; background:linear-gradient(160deg, rgba(38,14,18,.92) 0%, rgba(22,8,11,.96) 100%); border:1px solid rgba(22,200,208,.28); animation:evmGlow 4.5s ease-in-out infinite; backdrop-filter:blur(6px);">

    <div style="display:flex; flex-direction:column; align-items:center; animation:evmFloat 6s ease-in-out infinite;">
      <div style="width:74px; height:74px; border-radius:16px; display:flex; align-items:center; justify-content:center; background:linear-gradient(150deg, #16c8d0 0%, #0a7a8a 100%); box-shadow:0 8px 26px rgba(22,200,208,.4), inset 0 1px 0 rgba(255,255,255,.4);">
        <span style="font-size:30px; font-weight:700; letter-spacing:.04em; color:#0b1418;">EVM</span>
      </div>
    </div>

    <div style="text-align:center; margin:20px 0 4px; font-size:34px; font-weight:600; letter-spacing:.05em; color:#ffffff;">Bienvenido</div>
    <div style="text-align:center; margin-bottom:26px; font-size:13.5px; color:rgba(255,255,255,.5); font-weight:300;">Ingresa tus credenciales para continuar</div>

    <div style="display:flex; flex-direction:column; gap:14px;">
      <label style="display:flex; flex-direction:column; gap:7px;">
        <span style="font-size:11px; letter-spacing:.18em; text-transform:uppercase; color:#16c8d0; font-weight:500;">Usuario</span>
        <input ref="{{ userRef }}" onKeyDown="{{ onKey }}" type="text" autocomplete="username" placeholder="Tu usuario" style="height:46px; padding:0 15px; border-radius:10px; border:1px solid rgba(255,255,255,.14); background:rgba(255,255,255,.05); color:#fff; font-size:16px; font-family:inherit; letter-spacing:.02em;" style-focus="border-color:#16c8d0; background:rgba(22,200,208,.08);" />
      </label>

      <label style="display:flex; flex-direction:column; gap:7px;">
        <span style="font-size:11px; letter-spacing:.18em; text-transform:uppercase; color:#16c8d0; font-weight:500;">Contraseña</span>
        <div style="position:relative; display:flex; align-items:center;">
          <input ref="{{ passRef }}" onKeyDown="{{ onKey }}" type="password" autocomplete="current-password" placeholder="••••••••" style="flex:1; height:46px; padding:0 44px 0 15px; border-radius:10px; border:1px solid rgba(255,255,255,.14); background:rgba(255,255,255,.05); color:#fff; font-size:16px; font-family:inherit; letter-spacing:.02em;" style-focus="border-color:#16c8d0; background:rgba(22,200,208,.08);" />
          <button onClick="{{ togglePass }}" type="button" title="Mostrar/ocultar" style="position:absolute; right:8px; width:30px; height:30px; display:flex; align-items:center; justify-content:center; border:none; background:transparent; color:rgba(255,255,255,.45); cursor:pointer;" style-hover="color:#16c8d0;"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"></path><circle cx="12" cy="12" r="3"></circle></svg></button>
        </div>
      </label>
    </div>

    <div ref="{{ errRef }}" style="display:none; margin-top:14px; padding:10px 13px; border-radius:9px; background:rgba(200,40,52,.14); border:1px solid rgba(200,40,52,.4); color:#ff9aa2; font-size:13px; text-align:center; letter-spacing:.02em;"></div>

    <button onClick="{{ submit }}" style="width:100%; height:50px; margin-top:22px; border-radius:11px; border:none; cursor:pointer; font-family:inherit; font-size:18px; font-weight:600; letter-spacing:.12em; text-transform:uppercase; color:#0b1418; background:linear-gradient(180deg, #ffffff 0%, #dfe7e8 100%); box-shadow:0 6px 20px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.9);" style-hover="background:linear-gradient(180deg,#ffffff 0%,#c9eef0 100%); box-shadow:0 8px 26px rgba(22,200,208,.45), inset 0 1px 0 rgba(255,255,255,1);">Ingresar</button>

    <div style="margin-top:22px; padding-top:16px; border-top:1px solid rgba(255,255,255,.08); display:flex; align-items:center; justify-content:space-between; font-size:11px; color:rgba(255,255,255,.32); letter-spacing:.06em;">
      <span>AGD · Estimating</span>
      <span ref="{{ verRef }}" style="padding:3px 9px; border-radius:20px; background:rgba(22,200,208,.12); border:1px solid rgba(22,200,208,.3); color:#16c8d0; font-weight:500;">BETA 1</span>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  // ---- App version. Bump this string each release: 'BETA 1' -> 'BETA 2' ... ----
  APP_VERSION = 'BETA 1';

  // ---- Accounts (client-side gate for the beta). user -> password ----
  USERS = {
    'vicente': 'gu10max50w',
    'domi': '12345',
  };

  userRef = React.createRef();
  passRef = React.createRef();
  errRef = React.createRef();
  verRef = React.createRef();

  componentDidMount() {
    if (this.verRef.current) this.verRef.current.textContent = this.APP_VERSION;
    // Already signed in on this device? go straight to the app.
    let s = null;
    try { s = JSON.parse(localStorage.getItem('evm_auth') || 'null'); } catch (e) {}
    if (s && s.user) { this.goApp(); return; }
    if (this.userRef.current) this.userRef.current.focus();
  }

  showErr(msg) {
    const e = this.errRef.current; if (!e) return;
    e.textContent = msg; e.style.display = 'block';
  }
  clearErr() { const e = this.errRef.current; if (e) e.style.display = 'none'; }

  goApp() {
    const u = new URL(location.href);
    u.pathname = u.pathname.replace(/[^/]+$/, 'HOME.dc.html');
    u.search = '';
    location.href = u.toString();
  }

  async doSubmit() {
    if (this._busy) return;
    this.clearErr();
    const raw = (this.userRef.current?.value || '').trim().toLowerCase();
    const pass = (this.passRef.current?.value || '');
    if (!raw || !pass) { this.showErr('Ingresa usuario y contraseña.'); return; }
    // usuario "corto" para el espacio de nombres (vicente, domi…); acepta correo completo
    const user = raw.indexOf('@') >= 0 ? raw.split('@')[0] : raw;
    this._busy = true; this.showErr('Conectando…');
    try {
      const res = await window.EVMCloud.signInOrUp(raw, pass);
      if (!res.ok) { this._busy = false; this.showErr(res.error || 'No se pudo iniciar sesión.'); return; }
      // traer los datos de la nube ANTES de entrar a la app
      try { await window.EVMCloud.pullAll(); } catch (e) {}
      try { localStorage.setItem('evm_auth', JSON.stringify({ user, ts: Date.now() })); } catch (e) {}
      this.goApp();
    } catch (e) {
      this._busy = false;
      this.showErr('Error de conexión. Revisa tu internet e intenta de nuevo.');
    }
  }

  renderVals() {
    return {
      userRef: this.userRef,
      passRef: this.passRef,
      errRef: this.errRef,
      verRef: this.verRef,
      submit: () => this.doSubmit(),
      toggleFullscreen: () => { try { const d = document, el = d.documentElement; const fsEl = d.fullscreenElement || d.webkitFullscreenElement; if (fsEl) { (d.exitFullscreen || d.webkitExitFullscreen).call(d); } else { const req = el.requestFullscreen || el.webkitRequestFullscreen; if (req) { const p = req.call(el); if (p && p.catch) p.catch(() => {}); } } } catch (e) {} },
      onKey: (e) => { if (e.key === 'Enter') this.doSubmit(); },
      togglePass: () => {
        const p = this.passRef.current; if (!p) return;
        p.type = p.type === 'password' ? 'text' : 'password';
      },
    };
  }
}
</script>
</body>
</html>
